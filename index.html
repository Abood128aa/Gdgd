<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غدوش: التجربة السينمائية 🎭</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&family=Lalezar&family=Cairo:wght@900&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff4d6d;
            --accent-glow: rgba(255, 77, 109, 0.5);
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Tajawal', sans-serif;
            background: #050505; color: white;
            overflow: hidden;
        }

        /* خلفية الجزيئات المتحركة */
        #canvas-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }

        /* الشاشة الرئيسية */
        .viewport {
            position: relative; height: 100vh; width: 100%; z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 1s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .hero-img {
            width: 200px; height: 200px; border-radius: 50%;
            background: url('https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg') center/cover;
            border: 4px solid var(--accent);
            box-shadow: 0 0 50px var(--accent-glow);
            margin-bottom: 30px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* الأزرار الاحترافية */
        .btn-box {
            display: flex; flex-direction: column; gap: 20px; width: 85%; max-width: 400px;
        }

        .main-button {
            position: relative; padding: 25px; border-radius: 20px;
            border: none; background: var(--accent);
            color: white; font-size: 24px; font-weight: 900;
            cursor: pointer; overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px var(--accent-glow);
        }

        .main-button::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .main-button:hover::before { left: 100%; }
        .main-button:hover { transform: scale(1.05) translateY(-5px); box-shadow: 0 20px 40px var(--accent-glow); }
        .main-button:active { transform: scale(0.95); }

        /* شاشة العرض */
        #display-screen {
            position: fixed; top: 100%; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100;
            display: flex; flex-direction: column;
            transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .screen-active { transform: translateY(-100%); }

        .video-wrapper {
            position: relative; width: 100%; height: 60vh;
            border-bottom: 2px solid var(--accent);
        }

        .content-area {
            flex: 1; display: flex; flex-direction: column; justify-content: center;
            align-items: center; padding: 30px; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }

        #dynamic-msg {
            font-size: 2.5rem; text-align: center; font-weight: 900;
            margin-bottom: 30px; min-height: 80px;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .stats-badge {
            background: var(--glass); padding: 10px 25px; border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px;
            font-size: 14px; letter-spacing: 2px;
        }

        #progress-bar { color: var(--accent); font-weight: 900; font-size: 20px; }

        .retry-button {
            background: white; color: black; padding: 20px 50px;
            border-radius: 50px; font-size: 22px; font-weight: 900;
            border: none; cursor: pointer; transition: 0.3s;
        }

        /* قلوب الـ Action */
        .particle {
            position: absolute; pointer-events: none; z-index: 1000;
            animation: fly 3s ease-out forwards;
        }

        @keyframes fly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) rotate(360deg) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <div class="viewport" id="main-ui">
        <div class="hero-img"></div>
        <div class="btn-box">
            <button class="main-button" onclick="launch()">افتحي عالم غدوش 🎭✨</button>
            <a href="https://www.facebook.com/share/18CFRsDyg2/" target="_blank" 
               style="text-align: center; color: #888; text-decoration: none; font-size: 14px;">الحساب الشخصي 👤</a>
        </div>
    </div>

    <div id="display-screen">
        <div class="video-wrapper">
            <iframe id="video-engine" src="" allow="autoplay; fullscreen" allowfullscreen 
                    style="width: 100%; height: 100%; border: none;"></iframe>
        </div>
        <div class="content-area">
            <div class="stats-badge">طاقة السعادة: <span id="progress-bar">0</span>%</div>
            <div id="dynamic-msg"></div>
            <button class="retry-button" onclick="refreshExperience()">إعادة يا غدوش 🔄</button>
            <div onclick="backHome()" style="margin-top: 25px; color: #444; cursor: pointer; font-size: 14px;">إغلاق التجربة</div>
        </div>
    </div>

    <script>
        // نظام الجزيئات الخلفية
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let dots = [];
        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<80; i++) dots.push({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5, size: Math.random()*2
            });
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255, 77, 109, 0.3)";
            dots.forEach(d => {
                d.x += d.vx; d.y += d.vy;
                if(d.x<0 || d.x>canvas.width) d.vx *= -1;
                if(d.y<0 || d.y>canvas.height) d.vy *= -1;
                ctx.beginPath(); ctx.arc(d.x, d.y, d.size, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        initCanvas(); animate();

        // منطق العرض
        let vIndex = 0;
        let power = 0;
        const vids = ["https://streamable.com/e/2u533q?autoplay=1", "https://streamable.com/e/70ymh0?autoplay=1"];
        const quotes = [
            "أنتِ أيقونة الجمال يا غدوش 👑",
            "غدوش.. سحر لا ينتهي ✨",
            "ابتسامتكِ هي الوقود لهذا الموقع 💖",
            "نادرة، غالية، ومختلفة دائماً 💎",
            "العالم يبدو أفضل بوجودكِ 🦋"
        ];
        const fonts = ["'Lalezar'", "'Cairo'", "'Reem Kufi'", "'Tajawal'"];

        function launch() {
            document.getElementById('display-screen').classList.add('screen-active');
            refreshExperience();
        }

        function refreshExperience() {
            power = Math.min(power + 25, 100);
            document.getElementById('progress-bar').innerText = power;

            // تغيير الفيديو
            document.getElementById('video-engine').src = vids[vIndex];
            vIndex = (vIndex + 1) % vids.length;

            // تغيير الجملة بخط احترافي
            const msg = document.getElementById('dynamic-msg');
            msg.innerText = quotes[Math.floor(Math.random() * quotes.length)];
            msg.style.fontFamily = fonts[Math.floor(Math.random() * fonts.length)];
            msg.style.color = `hsl(${Math.random()*20 + 340}, 100%, 75%)`;
            
            createExplosion();
        }

        function createExplosion() {
            for(let i=0; i<40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerHTML = ['❤️','💖','✨','🌸'][Math.floor(Math.random()*4)];
                p.style.left = '50%'; p.style.top = '70%';
                p.style.setProperty('--x', (Math.random()-0.5)*400 + 'px');
                p.style.setProperty('--y', (Math.random()-0.5)*400 + 'px');
                p.style.fontSize = Math.random()*20 + 20 + 'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 3000);
            }
        }

        function backHome() {
            document.getElementById('display-screen').classList.remove('screen-active');
            document.getElementById('video-engine').src = "";
        }

        window.onresize = initCanvas;
    </script>
</body>
</html>
