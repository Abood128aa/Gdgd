<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ghadoush Premium Universe ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital@1&family=Cairo:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #ffd700; 
            --glow: rgba(255, 215, 0, 0.3);
            --card-bg: rgba(10, 10, 10, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            height: 100%; width: 100%; 
            background: #000; color: white; 
            overflow: hidden; font-family: 'Cairo', sans-serif;
            perspective: 2000px;
        }

        /* محرك الخلفية */
        #main-bg {
            position: fixed; inset: 0; z-index: 1;
            background-size: cover; background-position: center;
            transition: background-image 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            filter: brightness(0.3) scale(1.1);
        }

        /* نظام تساقط الورد الذكي */
        .petal {
            position: fixed; z-index: 1500; pointer-events: none;
            animation: fallAndSwing linear forwards;
        }
        @keyframes fallAndSwing {
            0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(110vh) translateX(100px) rotate(360deg); opacity: 0; }
        }

        /* واجهة الدخول الاستثنائية */
        #splash { 
            position: fixed; inset: 0; z-index: 5000; 
            background: #000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; transition: 1s ease-in-out;
        }

        .loader-ring {
            width: 200px; height: 200px; border-radius: 50%;
            border: 2px solid transparent; border-top-color: var(--accent);
            animation: spin 2s linear infinite; position: absolute;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .splash-img { 
            width: 160px; height: 160px; border-radius: 50%; 
            object-fit: cover; border: 3px solid var(--accent);
            box-shadow: 0 0 30px var(--glow); z-index: 5001;
        }

        /* هيكل الكرت الذكي (بدون رجفة) */
        #ui-layer { 
            position: absolute; inset: 0; z-index: 2000; 
            display: none; flex-direction: column; justify-content: center; align-items: center; 
        }

        .scene { width: 90%; max-width: 420px; height: auto; }

        .card-wrapper {
            width: 100%; position: relative;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        .neon-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 45px 30px; border-radius: 40px; 
            text-align: center; width: 100%;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.05);
            backface-visibility: hidden;
        }

        /* تأثيرات النصوص */
        #quote { 
            font-size: 1.6rem; font-family: 'Amiri', serif; 
            min-height: 120px; color: #fff; line-height: 1.8;
            margin-bottom: 30px; display: block;
            transition: opacity 0.4s;
        }

        /* الأزرار المطورة */
        .btn-magic { 
            width: 100%; background: linear-gradient(45deg, var(--accent), #ff8a00);
            color: #000; height: 65px; font-size: 1.3rem; border: none;
            border-radius: 22px; font-weight: 900; cursor: pointer;
            box-shadow: 0 15px 35px var(--glow); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }
        .btn-magic:active { transform: scale(0.96); }
        .btn-magic::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: rgba(255,255,255,0.2); transform: rotate(45deg);
            transition: 0.5s; left: -150%;
        }
        .btn-magic:hover::after { left: 100%; }

        .btn-social { 
            width: 55px; height: 55px; border-radius: 18px; background: rgba(255,255,255,0.07);
            display: flex; align-items: center; justify-content: center; color: var(--accent);
            text-decoration: none; transition: 0.3s; font-size: 1.4rem;
        }
        .btn-social:hover { background: var(--accent); color: #000; transform: translateY(-5px); }

        .btn-reset {
            margin-top: 25px; background: none; border: none; color: rgba(255,255,255,0.4);
            font-size: 0.9rem; cursor: pointer; letter-spacing: 1px;
        }

        /* فيديوهات الخلفية */
        .video-container { position: fixed; inset: 0; z-index: 2; opacity: 0; transition: 2s; pointer-events: none; }
        .active-video { opacity: 0.5; }
        iframe { width: 100%; height: 100%; border: none; transform: scale(1.2); }

        /* الأنيميشنات */
        .flip-anim { transform: rotateY(360deg); }
        .fade-out { opacity: 0; transform: scale(0.9); }
    </style>
</head>
<body>

    <div id="main-bg"></div>

    <div id="splash">
        <div class="loader-ring"></div>
        <img src="https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg" class="splash-img">
        <h2 style="margin-top:40px; color:var(--accent); letter-spacing:5px; font-weight:100;">LOADING MAGIC</h2>
        <button class="btn-magic" style="width:240px; margin-top:30px;" onclick="initSite(event)">ابدأ التجربة ✨</button>
    </div>

    <div id="layer1" class="video-container"><iframe id="player1"></iframe></div>
    <div id="layer2" class="video-container"><iframe id="player2"></iframe></div>

    <div id="ui-layer">
        <div class="scene">
            <div class="card-wrapper" id="cardWrapper">
                <div class="neon-card">
                    <div id="text-box"><span id="quote"></span></div>
                    
                    <div class="social-row" style="display:flex; gap:15px; justify-content:center; margin-bottom:30px;">
                        <a href="https://www.facebook.com/share/18CFRsDyg2/" target="_blank" class="btn-social"><i class="fab fa-facebook-f"></i></a>
                        <a href="https://www.instagram.com/hwrny823?igsh=MWhjM3cwbzd6ZmhjbA==" target="_blank" class="btn-social"><i class="fab fa-instagram"></i></a>
                        <div class="btn-social" onclick="shareSite()" style="cursor:pointer;"><i class="fas fa-share-nodes"></i></div>
                    </div>

                    <button class="btn-magic" onclick="magicLogic(event)">
                        <i class="fas fa-wand-sparkles"></i> سحر جديد
                    </button>
                    
                    <button class="btn-reset" onclick="location.reload()">تحديث المجرة</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const compliments = [
            "أنتِ غدوش.. تلك الروح التي تسكن في تفاصيل الجمال، وتُزهر في قلوبنا حباً لا ينتهي ✨",
            "يقولون القمر واحد، وأنا أقول أن ملامحكِ هي النسخة الأجمل منه على هذه الأرض 💎",
            "حضوركِ يطغى على كل الأضواء، كأنكِ شمس أشرقت في منتصف الليل لتنير أرواحنا 🌌",
            "أنتِ النادرة التي لا تُكرر، القصيدة التي كُتبت بماء الذهب وحُفظت في سويداء القلب 🕯️",
            "في عيونكِ أسرار الكون، وفي ابتسامتكِ شفاء لكل حزن، أنتِ ببساطة معجزة الزمن 🌹",
            "غدوش.. اسمكِ يعزف لحناً من النقاء، ووجهكِ يرسم لوحة من الرقيّ تفوق الخيال 🎨",
            "أنتِ لستِ جزءاً من هذا العالم المزدحم، بل أنتِ العالم الهادئ الذي نلجأ إليه لنرتاح 🌙"
        ];

        const themes = [
            { accent: '#ffd700', glow: 'rgba(255, 215, 0, 0.4)', img: "https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg" },
            { accent: '#ff2d75', glow: 'rgba(255, 45, 117, 0.4)', img: "https://i.ibb.co/FL93N2BX/7ee93916775239f03813755ed461cc83.jpg" },
            { accent: '#00f3ff', glow: 'rgba(0, 243, 255, 0.4)', img: "https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg" }
        ];

        const vids = ["2u533q", "70ymh0"];
        let vIdx = 0, themeIdx = 0, activeP = 1, isRunning = false;

        // محرك تساقط الورد المطور
        function spawnPetals() {
            const colors = ['#ff4d6d', '#ffb3c1', '#c9184a', '#fff'];
            const p = document.createElement('div');
            p.className = 'petal';
            const size = Math.random() * 20 + 10;
            p.innerHTML = `<svg viewBox="0 0 512 512" width="${size}" height="${size}"><path fill="${colors[Math.floor(Math.random()*4)]}" d="M256 0c100 0 181 81 181 181 0 100-81 181-181 181S75 281 75 181 156 0 256 0z"/></svg>`;
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (Math.random() * 3 + 5) + 's';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 8000);
        }

        // منطق السحر الأساسي
        function magicLogic(e) {
            if (isRunning) return;
            isRunning = true;
            
            // 1. تأثير الانقلاب والبراعة البصرية
            const wrapper = document.getElementById('cardWrapper');
            const quote = document.getElementById('quote');
            wrapper.classList.add('flip-anim');
            quote.style.opacity = '0';

            // 2. تغيير الثيم والألوان
            themeIdx = (themeIdx + 1) % themes.length;
            const currentTheme = themes[themeIdx];
            document.documentElement.style.setProperty('--accent', currentTheme.accent);
            document.documentElement.style.setProperty('--glow', currentTheme.glow);
            document.getElementById('main-bg').style.backgroundImage = `url('${currentTheme.img}')`;

            // 3. تبديل الفيديو
            const nP = document.getElementById(activeP === 1 ? "player1" : "player2");
            const oP = document.getElementById(activeP === 1 ? "player2" : "player1");
            const nL = document.getElementById(activeP === 1 ? "layer1" : "layer2");
            const oL = document.getElementById(activeP === 1 ? "layer2" : "layer1");

            oP.src = "";
            nP.src = `https://streamable.com/e/${vids[vIdx]}?autoplay=1&nocontrols=1`;
            nL.classList.add('active-video');
            oL.classList.remove('active-video');

            // 4. كتابة النص الجديد
            setTimeout(() => {
                startTyping();
                wrapper.classList.remove('flip-anim');
                quote.style.opacity = '1';
                isRunning = false;
            }, 800);

            vIdx = (vIdx + 1) % vids.length;
            activeP = activeP === 1 ? 2 : 1;
            
            // 5. إطلاق الورد بكثافة عند الضغط
            for(let i=0; i<10; i++) setTimeout(spawnPetals, i*100);
        }

        function startTyping() {
            const quoteEl = document.getElementById("quote");
            const text = compliments[Math.floor(Math.random() * compliments.length)];
            quoteEl.innerHTML = "";
            let i = 0;
            const timer = setInterval(() => {
                if (i < text.length) {
                    quoteEl.innerHTML += text[i++];
                } else {
                    clearInterval(timer);
                }
            }, 40);
        }

        function initSite(e) {
            document.getElementById('splash').classList.add('fade-out');
            setInterval(spawnPetals, 600);
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('ui-layer').style.display = 'flex';
                magicLogic();
            }, 1000);
        }

        async function shareSite() {
            if (navigator.share) await navigator.share({ title: 'Ghadoush Universe', url: window.location.href });
        }
    </script>
</body>
</html>
