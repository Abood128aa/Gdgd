<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghadoush Universe ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Cairo:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #ff0055; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; width: 100%; 
            background: #000; color: white; 
            overflow: hidden; font-family: 'Cairo', sans-serif; 
        }

        /* تأثير تكبير الصورة الخلفية */
        #main-bg {
            position: fixed; inset: 0;
            background: url('https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg') no-repeat center center;
            background-size: cover;
            opacity: 0.5;
            z-index: 1;
            display: none;
            animation: backgroundZoom 20s infinite alternate;
        }

        @keyframes backgroundZoom {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        .video-layer { position: fixed; inset: 0; z-index: 5; opacity: 0; transition: opacity 0.8s; }
        .active-video { opacity: 0.4; z-index: 6; }
        iframe { width: 100vw; height: 100vh; pointer-events: none; border: none; transform: scale(1.6); }

        /* شاشة البداية */
        #splash { 
            position: fixed; inset: 0; z-index: 2000; background: #000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .splash-img {
            width: 150px; border-radius: 50%; border: 3px solid var(--neon);
            margin-bottom: 20px; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 85, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 0, 85, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 85, 0); }
        }

        /* واجهة الأزرار */
        #ui-layer { 
            position: relative; z-index: 1000; height: 100vh;
            display: none; flex-direction: column; justify-content: center; align-items: center; 
        }

        .neon-card {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            border: 2px solid var(--neon);
            padding: 30px 20px; border-radius: 40px;
            text-align: center; width: 90%; max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transition: transform 0.15s ease; /* سرعة الفاكشن */
        }

        /* أنيميشن الضغط */
        .click-effect { transform: scale(0.92); }

        #text-box { min-height: 120px; }
        #quote { font-size: 1.8rem; font-weight: 900; line-height: 1.4; display: block; }

        .btn {
            background: var(--neon); color: white; border: none; padding: 16px; 
            border-radius: 50px; font-family: 'Lalezar'; font-size: 1.5rem; 
            cursor: pointer; width: 100%; margin-top: 15px; display: block;
            text-decoration: none; box-shadow: 0 5px 15px rgba(255, 0, 85, 0.4);
        }

        .btn-fb { background: #1877f2; font-size: 1.1rem; }
        .btn-back { background: none; border: 1px solid #444; color: #888; font-size: 0.9rem; margin-top: 15px; }

        #fade { position: fixed; inset: 0; background: black; z-index: 1500; opacity: 0; pointer-events: none; transition: 0.5s; }
    </style>
</head>
<body>

    <div id="main-bg"></div>
    <div id="fade"></div>

    <div id="splash">
        <img src="https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg" class="splash-img">
        <button class="btn" style="width:auto; padding:10px 40px;" onclick="init()">فتح عالم السحر ✨</button>
    </div>

    <div id="layer1" class="video-layer"><iframe id="player1" src="" allow="autoplay"></iframe></div>
    <div id="layer2" class="video-layer"><iframe id="player2" src="" allow="autoplay"></iframe></div>

    <div id="ui-layer">
        <div class="neon-card" id="card">
            <div id="text-box">
                <span id="quote" style="color: #00ffcc;">أنتِ أجمل حكاية في هذا الكون..</span>
                <span id="emoji" style="font-size: 3rem; display: block; margin-top: 10px;">💎</span>
            </div>
            
            <button class="btn" onclick="nextWave()">تغيير السحر 🔄</button>
            
            <a href="https://www.facebook.com/share/18CFRsDyg2/" target="_blank" class="btn btn-fb">👤 فيسبوك غادة</a>
            
            <button class="btn btn-back" onclick="location.reload()">🔙 رجوع للبداية</button>
        </div>
    </div>

    <script>
        const vids = ["2u533q", "70ymh0"];
        const colors = ["#00ffcc", "#ff0055", "#fffb00", "#ff00ff", "#50b7f5", "#00ff00"];
        const compliments = [
            {t: "جمالكِ يكتب فصلاً جديداً من السحر", e: "✨"},
            {t: "أنتِ الملاذ والهدوء في هذا العالم", e: "🕊️"},
            {t: "في عيونكِ أسرار لا يعرفها إلا القمر", e: "🌙"},
            {t: "ابتسامتكِ تضيء عتمة أيامي", e: "🎶"},
            {t: "أنتِ الملكة المتوجة على عرش الجمال", e: "👑"}
        ];

        let vIdx = 0;
        let activeP = 1;

        function init() {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('main-bg').style.display = 'block';
            document.getElementById('ui-layer').style.display = 'flex';
            nextWave(true);
        }

        function nextWave(isFirst = false) {
            const card = document.getElementById('card');
            const quote = document.getElementById('quote');
            
            // فاكشن الضغط
            card.classList.add('click-effect');
            setTimeout(() => card.classList.remove('click-effect'), 150);

            if(!isFirst) quote.style.opacity = "0";

            setTimeout(() => {
                // إيقاف الصوت القديم
                const oldP = activeP === 1 ? "player2" : "player1";
                document.getElementById(oldP).src = "";

                // تشغيل الجديد
                const nextP = activeP === 1 ? "player1" : "player2";
                const nextL = activeP === 1 ? "layer1" : "layer2";
                const otherL = activeP === 1 ? "layer2" : "layer1";

                document.getElementById(nextP).src = `https://streamable.com/e/${vids[vIdx]}?autoplay=1&nocontrols=1`;
                document.getElementById(nextL).classList.add('active-video');
                document.getElementById(otherL).classList.remove('active-video');

                // تحديث النص واللون
                const item = compliments[Math.floor(Math.random() * compliments.length)];
                quote.innerText = item.t;
                document.getElementById('emoji').innerText = item.e;
                quote.style.color = colors[Math.floor(Math.random() * colors.length)];
                quote.style.opacity = "1";

                vIdx = (vIdx + 1) % vids.length;
                activeP = activeP === 1 ? 2 : 1;
            }, isFirst ? 0 : 300);
        }
    </script>
</body>
</html>
