<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghadoush Universe ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Cairo:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #ff0055; --gold: #ffd700; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; width: 100%; 
            background: #000; color: white; 
            overflow: hidden; font-family: 'Cairo', sans-serif; 
        }

        /* الصورة الخلفية */
        #main-bg {
            position: fixed; inset: 0;
            background: url('https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg') no-repeat center center;
            background-size: cover;
            opacity: 0.45;
            z-index: 1;
        }

        /* طبقات الفيديو */
        .video-layer { position: fixed; inset: 0; z-index: 5; opacity: 0; transition: opacity 0.8s ease; }
        .active-video { opacity: 0.35; z-index: 6; }
        iframe { width: 100vw; height: 100vh; pointer-events: none; border: none; transform: scale(1.5); }

        #splash { 
            position: fixed; inset: 0; z-index: 2000; background: #000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }

        #ui-layer { 
            position: relative; z-index: 100; height: 100vh; 
            display: none; flex-direction: column; justify-content: center; align-items: center; 
        }

        .neon-card {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.15);
            padding: 35px 20px; border-radius: 45px;
            text-align: center; width: 92%; max-width: 450px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        }

        #text-box { min-height: 140px; perspective: 1000px; overflow: hidden; margin-bottom: 10px; }
        
        #quote {
            font-size: 2.1rem; font-weight: 900; line-height: 1.4;
            display: block; opacity: 0;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .slide-in { opacity: 1 !important; transform: scale(1) rotateX(0deg); }
        .slide-out { opacity: 0 !important; transform: scale(0.8) rotateX(-90deg); }

        #emoji { font-size: 3rem; margin-top: 10px; display: block; }

        .btn {
            background: linear-gradient(45deg, var(--neon), #ff4d88);
            color: white; border: none; padding: 18px; border-radius: 60px;
            font-family: 'Lalezar'; font-size: 1.6rem; cursor: pointer;
            width: 100%; margin-top: 20px; transition: 0.3s;
            box-shadow: 0 10px 25px rgba(255, 0, 85, 0.3);
        }

        /* زر الرجوع */
        .btn-back {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 1rem; padding: 10px 30px; margin-top: 15px;
            color: #aaa; text-decoration: none; border-radius: 50px;
        }
        .btn-back:hover { background: rgba(255,255,255,0.1); color: white; }

        #fade-overlay { position: fixed; inset: 0; background: black; z-index: 1500; opacity: 0; pointer-events: none; transition: 0.6s; }
    </style>
</head>
<body>

    <div id="main-bg"></div>
    <div id="fade-overlay"></div>

    <div id="splash">
        <img src="https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg" style="width:140px; border-radius:50%; margin-bottom:20px; border:3px solid var(--neon);">
        <button class="btn" style="width:auto; padding:10px 45px;" onclick="init()">فتح عالم السحر ✨</button>
    </div>

    <div id="layer1" class="video-layer"><iframe id="player1" src="" allow="autoplay; fullscreen"></iframe></div>
    <div id="layer2" class="video-layer"><iframe id="player2" src="" allow="autoplay; fullscreen"></iframe></div>

    <div id="ui-layer">
        <div class="neon-card">
            <div id="text-box">
                <span id="quote">أنتِ الحكاية التي لا تكررها الأيام..</span>
                <span id="emoji">💎</span>
            </div>
            <button class="btn" onclick="nextWave()">المزيد من السحر 🔄</button>
            <button class="btn-back" onclick="goBack()">🔙 رجوع للبداية</button>
        </div>
    </div>

    <script>
        const vids = ["2u533q", "70ymh0"];
        const colors = ["#00ffcc", "#ff0055", "#fffb00", "#ff00ff", "#00ff00", "#50b7f5"];
        
        const compliments = [
            {t: "أنتِ النور الذي يرفض الانطفاء في هذا العالم", e: "✨"},
            {t: "جمالكِ يتجاوز حدود الوصف ويكسر قواعد المنطق", e: "🌌"},
            {t: "في ملامحكِ هدوء البحر وفي روحكِ شموخ الجبال", e: "🌊"},
            {t: "كأنكِ قمرٌ سقط سهواً من السماء ليستقر في يومي", e: "🌙"},
            {t: "أنتِ القصيدة التي عجز أعظم الشعراء عن كتابتها", e: "✒️"},
            {t: "خُلقتِ لتكوني ملكة، والتاج لا يليق إلا برأسكِ", e: "👑"},
            {t: "أنتِ المعجزة التي تجعلني أؤمن أن الجمال لا يزال بخير", e: "🎁"},
            {t: "ابتسامتكِ هي اللحن الوحيد الذي لا أملّ من سماعه", e: "🎶"},
            {t: "أنتِ الملاذ الآمن والوطن الذي لا يُغادره القلب", e: "🏡"},
            {t: "لا مثيل لكِ، فأنتِ النسخة الوحيدة والأصلية للكمال", e: "📜"},
            {t: "حين تضحكين، يبتسم القدر وتتفتح براعم الأمل", e: "🌻"},
            {t: "أنتِ الحلم الذي استيقظتُ لأجده حقيقةً أمامي", e: "🎐"},
            {t: "دمتِ لي حباً لا ينتهي، وجمالاً لا يذبل أبداً", e: "♾️"},
            {t: "أنتِ الأناقة التي لا تشتريها الأموال، بل تمنحها الروح", e: "👗"}
        ];

        let vIdx = 0;
        let activeP = 1;

        function init() {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            nextWave(true);
        }

        function stopOldPlayer() {
            const oldPId = activeP === 1 ? "player2" : "player1";
            document.getElementById(oldPId).src = ""; // إيقاف الصوت القديم تماماً
        }

        function nextWave(isFirst = false) {
            const quote = document.getElementById('quote');
            const curtain = document.getElementById('fade-overlay');
            
            if(!isFirst) {
                quote.className = 'slide-out';
                curtain.style.opacity = "0.5";
            }

            setTimeout(() => {
                stopOldPlayer(); // إيقاف أي صوت شغال حالياً قبل البدء بالجديد

                const nextPId = activeP === 1 ? "player1" : "player2";
                const nextLId = activeP === 1 ? "layer1" : "layer2";
                const otherLId = activeP === 1 ? "layer2" : "layer1";

                document.getElementById(nextPId).src = `https://streamable.com/e/${vids[vIdx]}?autoplay=1&nocontrols=1`;
                document.getElementById(nextLId).classList.add('active-video');
                document.getElementById(otherLId).classList.remove('active-video');

                const randomComp = compliments[Math.floor(Math.random() * compliments.length)];
                quote.innerText = randomComp.t;
                document.getElementById('emoji').innerText = randomComp.e;
                quote.style.color = colors[Math.floor(Math.random() * colors.length)];

                quote.className = 'slide-in';
                curtain.style.opacity = "0";

                vIdx = (vIdx + 1) % vids.length;
                activeP = activeP === 1 ? 2 : 1;
            }, isFirst ? 0 : 500);
        }

        function goBack() {
            document.getElementById('player1').src = "";
            document.getElementById('player2').src = "";
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('splash').style.display = 'flex';
        }
    </script>
</body>
</html>
