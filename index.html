<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم غدوش ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #ff0055; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background: var(--bg); color: white; overflow: hidden; font-family: 'Cairo', sans-serif; }

        /* طبقات الفيديو المزدوجة لضمان عدم انقطاع الصوت */
        .video-layer { position: fixed; inset: 0; z-index: 5; opacity: 0; transition: opacity 0.8s ease-in-out; background: #000; }
        .active-video { opacity: 0.5; z-index: 10; }
        iframe { width: 100vw; height: 100vh; pointer-events: none; border: none; transform: scale(1.6); }

        /* شاشة البداية */
        #splash { position: fixed; inset: 0; z-index: 2000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .avatar { width: 160px; height: 160px; border-radius: 50%; border: 3px solid var(--neon); box-shadow: 0 0 20px var(--neon); margin-bottom: 20px; }

        /* الواجهة */
        #ui-layer { position: relative; z-index: 100; height: 100vh; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .neon-card { background: rgba(10, 10, 10, 0.85); border: 2px solid var(--neon); padding: 25px; border-radius: 30px; text-align: center; box-shadow: 0 0 30px rgba(255, 0, 85, 0.3); width: 85%; max-width: 380px; backdrop-filter: blur(10px); }
        
        .btn { background: var(--neon); color: white; border: none; padding: 15px; border-radius: 50px; font-family: 'Lalezar'; font-size: 1.4rem; cursor: pointer; width: 100%; margin-bottom: 12px; display: block; text-decoration: none; transition: 0.3s; box-shadow: 0 5px 15px rgba(255, 0, 85, 0.4); }
        .btn:active { transform: scale(0.95); }

        /* تأثير التلاشي السريع */
        #fade-curtain { position: fixed; inset: 0; background: black; z-index: 1500; opacity: 0; pointer-events: none; transition: 0.5s ease-out; }
    </style>
</head>
<body>

    <div id="fade-curtain"></div>

    <div id="splash">
        <img src="https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg" class="avatar">
        <button class="btn" style="width: auto; padding: 10px 40px;" onclick="init()">دخول 🔊</button>
    </div>

    <div id="layer1" class="video-layer"><iframe id="player1" src="" allow="autoplay; fullscreen"></iframe></div>
    <div id="layer2" class="video-layer"><iframe id="player2" src="" allow="autoplay; fullscreen"></iframe></div>

    <div id="ui-layer">
        <div class="neon-card">
            <h1 id="quote" style="margin-bottom: 20px; font-size: 1.5rem; min-height: 40px;"></h1>
            <button class="btn" onclick="switchVideo()">تبديل سريع ✨</button>
            <a href="https://www.facebook.com/share/18CFRsDyg2/" target="_blank" class="btn" style="background: #1877f2; font-size: 1.1rem;">👤 فيسبوك</a>
            <p style="font-size: 10px; color: #444; cursor: pointer;" onclick="location.reload()">إعادة تحميل</p>
        </div>
    </div>

    <script>
        const vids = ["2u533q", "70ymh0"];
        const quotes = ["أنتِ النور يا غدوش ✨", "سحر عيونكِ يغلب الكل 💖", "غدوش.. الملكة دائماً 👑", "ابتسامتكِ حياة ✨"];
        let currentIdx = 0;
        let activePlayer = 1;

        function init() {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            // تحميل أول فيديو فوراً
            switchVideo(true);
        }

        function switchVideo(isFirst = false) {
            const curtain = document.getElementById('fade-curtain');
            if(!isFirst) curtain.style.opacity = "1"; // تلاشي سريع جداً

            setTimeout(() => {
                const nextIdx = (currentIdx + 1) % vids.length;
                const nextPlayerId = activePlayer === 1 ? "player2" : "player1";
                const nextLayerId = activePlayer === 1 ? "layer2" : "layer1";
                const currentPlayerId = activePlayer === 1 ? "player1" : "player2";
                const currentLayerId = activePlayer === 1 ? "layer1" : "layer2";

                // تحميل الفيديو الجديد في المشغل المخفي
                const nextPlayer = document.getElementById(nextPlayerId);
                nextPlayer.src = `https://streamable.com/e/${vids[currentIdx]}?autoplay=1&nocontrols=1`;

                // تبديل الطبقات (تلاشي متداخل)
                document.getElementById(nextLayerId).classList.add('active-video');
                document.getElementById(currentLayerId).classList.remove('active-video');
                
                document.getElementById('quote').innerText = quotes[Math.floor(Math.random() * quotes.length)];
                
                activePlayer = activePlayer === 1 ? 2 : 1;
                currentIdx = nextIdx;

                setTimeout(() => {
                    curtain.style.opacity = "0";
                }, 300); // سرعة الكشف
            }, isFirst ? 0 : 500); // سرعة الانتقال الكلي
        }
    </script>
</body>
</html>
