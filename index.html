<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghadoush Universe ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Cairo:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #ff0055; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; width: 100%; 
            background: #000; color: white; 
            overflow: hidden; font-family: 'Cairo', sans-serif; 
        }

        /* صورة الخلفية الثابتة */
        #main-bg {
            position: fixed; inset: 0;
            background: url('https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg') no-repeat center center;
            background-size: cover;
            opacity: 0.45;
            z-index: 1;
        }

        /* الفيديوهات */
        .video-layer { position: fixed; inset: 0; z-index: 5; opacity: 0; transition: opacity 0.8s; }
        .active-video { opacity: 0.35; z-index: 6; }
        iframe { width: 100vw; height: 100vh; pointer-events: none; border: none; transform: scale(1.5); }

        /* شاشة البداية مع أنيميشن للصورة */
        #splash { 
            position: fixed; inset: 0; z-index: 2000; background: #000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .splash-img {
            width: 160px; border-radius: 50%; border: 4px solid var(--neon);
            margin-bottom: 25px;
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 85, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(255, 0, 85, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 85, 0); }
        }

        /* واجهة الأزرار */
        #ui-layer { 
            position: absolute; inset: 0; z-index: 1000;
            display: none; flex-direction: column; justify-content: center; align-items: center; 
        }

        .neon-card {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 30px 20px; border-radius: 40px;
            text-align: center; width: 90%; max-width: 420px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transition: transform 0.2s cubic-bezier(0.17, 0.89, 0.32, 1.49);
        }

        /* أنيميشن الهزة عند الضغط */
        .card-click { transform: scale(0.95) rotate(1deg); }

        #text-box { min-height: 130px; overflow: hidden; }
        #quote {
            font-size: 2rem; font-weight: 900; line-height: 1.4;
            display: block; opacity: 0; transition: 0.5s;
        }
        .slide-in { opacity: 1 !important; transform: translateY(0); }
        .slide-out { opacity: 0 !important; transform: translateY(-20px); }

        .btn {
            background: linear-gradient(45deg, var(--neon), #ff4d88);
            color: white; border: none; padding: 18px; border-radius: 50px;
            font-family: 'Lalezar'; font-size: 1.6rem; cursor: pointer;
            width: 100%; margin-top: 15px; transition: 0.3s;
            box-shadow: 0 8px 20px rgba(255, 0, 85, 0.3);
        }

        .btn-back {
            background: none; border: 1px solid rgba(255,255,255,0.2);
            color: #ccc; font-size: 0.9rem; padding: 10px 25px;
            margin-top: 20px; border-radius: 50px; cursor: pointer;
        }

        #fade-overlay { position: fixed; inset: 0; background: black; z-index: 1500; opacity: 0; pointer-events: none; transition: 0.5s; }
    </style>
</head>
<body>

    <div id="main-bg"></div>
    <div id="fade-overlay"></div>

    <div id="splash">
        <img src="https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg" class="splash-img">
        <button class="btn" style="width:auto; padding:10px 45px;" onclick="init()">فتح عالم السحر ✨</button>
    </div>

    <div id="layer1" class="video-layer"><iframe id="player1" src="" allow="autoplay"></iframe></div>
    <div id="layer2" class="video-layer"><iframe id="player2" src="" allow="autoplay"></iframe></div>

    <div id="ui-layer">
        <div class="neon-card" id="mainCard">
            <div id="text-box">
                <span id="quote">أنتِ السحر في عالم من الخيال..</span>
                <span id="emoji" style="font-size: 3rem; display: block; margin-top: 10px;">💎</span>
            </div>
            <button class="btn" onclick="nextWave()">تغيير السحر 🔄</button>
            <button class="btn-back" onclick="goBack()">🔙 رجوع للبداية</button>
        </div>
    </div>

    <script>
        const vids = ["2u533q", "70ymh0"];
        const colors = ["#00ffcc", "#ff0055", "#fffb00", "#ff00ff", "#50b7f5"];
        const compliments = [
            {t: "جمالكِ يتجاوز حدود الوصف", e: "✨"},
            {t: "أنتِ القصيدة التي لم تكتب بعد", e: "✒️"},
            {t: "خُلقتِ لتكوني ملكة على القلوب", e: "👑"},
            {t: "ابتسامتكِ هي اللحن المفضل لقلبي", e: "🎶"},
            {t: "أنتِ الملاذ الآمن لكل جميل", e: "🏡"},
            {t: "لا مثيل لكِ في هذا الكون", e: "📜"},
            {t: "أنتِ النجمة التي لا تغيب", e: "⭐"}
        ];

        let vIdx = 0;
        let activeP = 1;

        function init() {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            nextWave(true);
        }

        function nextWave(isFirst = false) {
            const card = document.getElementById('mainCard');
            const quote = document.getElementById('quote');
            
            // إضافة فاكشن الضغط المتزامن
            card.classList.add('card-click');
            setTimeout(() => card.classList.remove('card-click'), 200);

            if(!isFirst) quote.className = 'slide-out';

            setTimeout(() => {
                // إيقاف الصوت القديم
                const oldPId = activeP === 1 ? "player2" : "player1";
                document.getElementById(oldPId).src = "";

                // تشغيل الجديد
                const nextPId = activeP === 1 ? "player1" : "player2";
                const nextLId = activeP === 1 ? "layer1" : "layer2";
                const otherLId = activeP === 1 ? "layer2" : "layer1";

                document.getElementById(nextPId).src = `https://streamable.com/e/${vids[vIdx]}?autoplay=1&nocontrols=1`;
                document.getElementById(nextLId).classList.add('active-video');
                document.getElementById(otherLId).classList.remove('active-video');

                const item = compliments[Math.floor(Math.random() * compliments.length)];
                quote.innerText = item.t;
                document.getElementById('emoji').innerText = item.e;
                quote.style.color = colors[Math.floor(Math.random() * colors.length)];
                
                quote.className = 'slide-in';

                vIdx = (vIdx + 1) % vids.length;
                activeP = activeP === 1 ? 2 : 1;
            }, isFirst ? 0 : 400);
        }

        function goBack() {
            location.reload(); // أضمن طريقة للرجوع وتصفير كل شيء
        }
    </script>
</body>
</html>
