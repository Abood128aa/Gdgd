<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ghadoush Universe ✨</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Cairo:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --neon: #ff0055; --glow: 20px; --bg-tint: rgba(0,0,0,0.7); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none !important; }
        body, html { height: 100%; width: 100%; background: #000; color: white; overflow: hidden; font-family: 'Cairo', sans-serif; perspective: 1000px; }

        /* الخلفية والنجوم */
        #main-bg { position: fixed; inset: -20px; z-index: 1; background-image: url('https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg'); background-size: cover; background-position: center; transition: 1.5s ease-in-out; animation: slowZoom 25s infinite alternate ease-in-out; }
        @keyframes slowZoom { from { transform: scale(1); } to { transform: scale(1.1); } }
        .star { position: fixed; background: white; border-radius: 50%; pointer-events: none; opacity: 0; animation: star-glow 2s infinite; z-index: 2; }
        @keyframes star-glow { 0%, 100% { opacity: 0; } 50% { opacity: 0.8; } }

        /* شاشة الدخول */
        #splash { position: fixed; inset: 0; z-index: 5000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .splash-img { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--neon); object-fit: cover; box-shadow: 0 0 var(--glow) var(--neon); }
        
        /* البطاقة الرئيسية */
        #ui-layer { position: absolute; inset: 0; z-index: 1000; display: none; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 5vh; transform-style: preserve-3d; }
        .neon-card { background: var(--bg-tint); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 25px 20px; border-radius: 40px; text-align: center; width: 92%; max-width: 420px; transition: 0.1s linear; border-bottom: 4px solid var(--neon); position: relative; }
        
        #quote { font-size: 1.8rem; font-weight: 900; font-family: 'Lalezar', cursive; text-shadow: 0 0 var(--glow) var(--neon); display: block; min-height: 160px; color: #fff; line-height: 1.4; margin-bottom: 15px; cursor: pointer; }
        .speaking { animation: textGlow 1.5s infinite alternate; }
        @keyframes textGlow { from { text-shadow: 0 0 10px var(--neon); } to { text-shadow: 0 0 30px var(--neon), 0 0 40px white; } }

        .btn-magic { width: 100%; background: #fff; color: #000; height: 55px; font-size: 1.3rem; font-weight: 900; border-radius: 15px; border:none; cursor:pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* الخزنة والرسائل */
        #secret-vault { position: fixed; inset: 0; z-index: 10000; background: #000; display: none; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; overflow-y: auto; }
        .vault-img { width: 100%; border-radius: 15px; border: 1px solid var(--neon); }
        #msg-box { display: none; position: absolute; inset: 15px; background: rgba(0,0,0,0.98); border-radius: 30px; z-index: 6000; flex-direction: column; padding: 20px; border: 1px solid var(--neon); }
        #msg-input { background: transparent; border: 1px solid #333; border-radius: 15px; color: white; padding: 15px; flex: 1; font-family: 'Cairo'; outline: none; }
        #video-container { position: fixed; inset: 0; z-index: 0; display: none; pointer-events: none; }
        iframe { width: 100%; height: 100%; border: none; opacity: 0.6; }
    </style>
</head>
<body oncontextmenu="return false;">

    <audio id="bgMusic" loop><source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg"></audio>
    <div id="main-bg"></div>
    <div id="video-container"></div>
    <div id="stars-container"></div>

    <div id="secret-vault">
        <h2 style="grid-column: 1 / -1; text-align: center; color: var(--neon); padding: 20px;">خزنة الذكريات السحرية ✨</h2>
        <img src="https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg" class="vault-img">
        <button onclick="document.getElementById('secret-vault').style.display='none'" style="grid-column: 1 / -1; padding: 15px; background: white; border-radius: 15px; margin-top: 20px; font-weight: bold;">إغلاق الخزنة</button>
    </div>

    <div id="splash">
        <img src="https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg" class="splash-img" id="secretTrigger">
        <div style="color: var(--neon); font-weight: bold; margin-top: 20px;">🌸 حهورأنہيہة يہا خہال 🌸</div> 
        <button class="btn-magic" style="width:280px; background: var(--neon); color: white; margin-top:30px;" onclick="init()">دخول لعالم غدوش ✨</button>
    </div>

    <div id="ui-layer">
        <div class="neon-card" id="mainCard">
            <div id="msg-box">
                <textarea id="msg-input" placeholder="اكتبي لقلبي..."></textarea>
                <button class="btn-magic" style="margin-top:10px; background:var(--neon); color:white" onclick="sendToCloud()">إرسال ❤️</button>
                <button onclick="toggleMsgBox()" style="background:none; border:none; color:#555; margin-top:5px;">إغلاق</button>
            </div>
            
            <div id="text-box"><span id="quote" onclick="speakQuote()"></span></div>
            
            <button class="btn-magic" onclick="nextWave()">سحر جديد 🪄</button>
            
            <center style="margin-top:15px; display:flex; justify-content:center; gap:40px; align-items:center">
                <i class="fas fa-music" id="musicIcon" style="opacity:0.4; cursor:pointer" onclick="toggleMusic()"></i>
                <div id="heart" style="font-size:50px; cursor:pointer;" onclick="spawnHearts(event)">❤️</div>
                <i class="fas fa-envelope-open-text" style="opacity:0.4; cursor:pointer" onclick="toggleMsgBox()"></i>
            </center>
            <div style="font-size:0.6rem; color:#444; margin-top:10px;">اضغطي على الكلام ليُهمس لكِ 🎙️</div>
        </div>
    </div>

    <script>
        // إعدادات Firebase
        const firebaseConfig = { apiKey: "AIzaSyBcbf6AnqVs46gBw2dNjC9TREbx5f4DfJM", authDomain: "ghadoush-app.firebaseapp.com", projectId: "ghadoush-app", databaseURL: "https://ghadoush-app-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // الجمل الأصلية العشرة
        const compliments = [
            "غدوش.. أنتِ لستِ مجرد وجه جميل، أنتِ قصيدة كتبها القمر ونثرتها النجوم ✨",
            "في عيونكِ يغرق الكلام، وفي حضوركِ يصمت الجمال خجلاً يا ملكة الكون 👑",
            "لو كان للجمال عنوان لكان اسمكِ، ولو كان للسحر موطن لكان بين تفاصيل ملامحكِ 🐚",
            "أنتِ النادرة التي لا تتكرر، كأنكِ خُلقتِ من خيوط الشمس ومن نقاء الغيم ☁️",
            "حين تبتسمين، يزهر الورد في غير أوانه، ويتنفس العالم عطراً يشبه قلبكِ 🌹",
            "يا جميلة الروح والطلة، حضوركِ يطغى على كل الأضواء، وكأنكِ الشمس ☀️",
            "غدوش.. أنتِ الاستثناء الوحيد، فجمالكِ يفوق الخيال وسحركِ لا يدركه وصف 💎",
            "جمالكِ هو الفن الحقيقي، كلوحة رسمتها يد القدر لتبهر كل من ينظر إليها 🎨",
            "أنتِ النبض الذي يحيي الأمل، والوجه الذي يبث السكينة في القلوب المتعبة ❤️",
            "يا قمر الليالي المظلمة، نوركِ يضيء الروح قبل الدروب، وضحكتكِ هي لحن السعادة 🎶"
        ];

        let vIdx = 0, isTyping = false;

        // الربط بالتحكم عن بعد
        db.ref('live_control').on('value', (snap) => {
            const data = snap.val(); if(!data) return;
            if(data.text) typeEffect(data.text);
            if(data.bg) document.getElementById('main-bg').style.backgroundImage = `url('${data.bg}')`;
            if(data.video) {
                const v = document.getElementById('video-container'); v.style.display = 'block';
                v.innerHTML = `<iframe src="https://www.youtube.com/embed/${data.video}?autoplay=1&mute=1&loop=1"></iframe>`;
            } else { document.getElementById('video-container').style.display = 'none'; }
        });

        function typeEffect(text) {
            const q = document.getElementById("quote"); q.innerHTML = ""; isTyping = true; let i = 0;
            const timer = setInterval(() => { if(i < text.length) q.innerHTML += text[i++]; else { clearInterval(timer); isTyping = false; } }, 50);
        }

        function init() {
            createStars();
            document.getElementById('splash').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            typeEffect(compliments[0]);
        }

        function nextWave() { vIdx = (vIdx + 1) % compliments.length; typeEffect(compliments[vIdx]); }

        function speakQuote() {
            const m = new SpeechSynthesisUtterance(document.getElementById('quote').innerText);
            m.lang = 'ar-SA'; m.onstart = () => document.getElementById('quote').classList.add('speaking');
            m.onend = () => document.getElementById('quote').classList.remove('speaking');
            window.speechSynthesis.speak(m);
        }

        function createStars() {
            const container = document.getElementById('stars-container');
            for(let i=0; i<50; i++) {
                const s = document.createElement('div'); s.className = 'star';
                s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
                s.style.animationDelay = Math.random()*5+'s'; container.appendChild(s);
            }
        }

        function spawnHearts(e) {
            for(let i=0; i<8; i++) {
                const h = document.createElement('div'); h.innerHTML = '❤️'; h.style.position = 'absolute';
                h.animate([{transform:'scale(1)', opacity:1}, {transform:`translate(${(Math.random()-0.5)*300}px, -250px) scale(0)`, opacity:0}], 1200);
                e.currentTarget.appendChild(h); setTimeout(() => h.remove(), 1200);
            }
        }

        function toggleMsgBox() { const b = document.getElementById('msg-box'); b.style.display = (b.style.display==='flex') ? 'none' : 'flex'; }
        function sendToCloud() {
            const v = document.getElementById('msg-input').value; if(!v) return;
            db.ref('messages').push({ text: v, time: Date.now() });
            document.getElementById('msg-input').value = ""; toggleMsgBox(); alert("وصلت لقلبي ❤️");
        }
        function toggleMusic() { 
            const m = document.getElementById('bgMusic'); 
            if(m.paused) { m.play(); document.getElementById('musicIcon').style.opacity = "1"; }
            else { m.pause(); document.getElementById('musicIcon').style.opacity = "0.4"; }
        }

        let pressTimer;
        document.getElementById('secretTrigger').addEventListener('touchstart', () => pressTimer = setTimeout(() => document.getElementById('secret-vault').style.display='grid', 3000));
        document.getElementById('secretTrigger').addEventListener('touchend', () => clearTimeout(pressTimer));
    </script>
</body>
</html>
