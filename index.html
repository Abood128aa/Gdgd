<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة غادة الكبرى ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ff758f;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Tajawal', sans-serif;
            background: #000; overflow: hidden;
        }

        /* الشاشة الرئيسية */
        .hero-section {
            position: relative; height: 100vh; width: 100%;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg');
            background-size: cover; background-position: center;
            transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .main-content { text-align: center; color: white; z-index: 10; }

        /* القلب النابض */
        .beating-heart {
            font-size: 80px;
            color: var(--primary);
            cursor: pointer;
            filter: drop-shadow(0 0 20px var(--primary));
            animation: beat 1.2s infinite;
            margin-bottom: 20px;
            display: inline-block;
        }

        @keyframes beat {
            0% { transform: scale(1); }
            15% { transform: scale(1.25); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }

        .btn-main {
            background: var(--primary); color: white; border: none;
            padding: 15px 40px; border-radius: 50px; font-size: 20px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.5);
        }

        .btn-main:hover { transform: scale(1.1); background: #fff; color: var(--primary); }

        /* شاشة المفاجأة كاملة */
        #surprise-screen {
            position: fixed; top: 100%; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: top 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }

        #surprise-screen.active { top: 0; }

        .video-container {
            width: 100%; height: 70vh;
            background: #000; position: relative;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .info-panel {
            padding: 20px; text-align: center; color: white;
            background: linear-gradient(to top, #000, transparent);
            width: 100%;
        }

        /* العداد الاحترافي */
        .counter-box {
            font-size: 14px; color: #ffbcc9; margin-top: 10px;
            text-transform: uppercase; letter-spacing: 2px;
        }

        #count-number { font-weight: bold; color: white; font-size: 18px; }

        .msg-text { font-size: 1.5rem; margin: 15px 0; font-weight: bold; height: 60px; }

        .action-btns { display: flex; gap: 10px; margin-top: 10px; }

        .btn-retry {
            background: #fff; color: #000; padding: 12px 30px;
            border-radius: 30px; font-weight: bold; cursor: pointer; border: none;
        }

        .btn-close {
            background: rgba(255,255,255,0.1); color: #fff; padding: 12px 20px;
            border-radius: 30px; cursor: pointer; border: 1px solid rgba(255,255,255,0.3);
        }

        /* مؤثرات تساقط */
        .floating-emoji {
            position: absolute; pointer-events: none; z-index: 200;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <section class="hero-section" id="hero">
        <div class="main-content">
            <div class="beating-heart" onclick="openSurprise()">❤️</div>
            <h1 style="font-size: 32px; margin-bottom: 30px;">لأجلكِ غادة..</h1>
            <button class="btn-main" onclick="openSurprise()">اضغطي للمفاجأة 🎁</button>
            <br><br>
            <a href="https://www.facebook.com/share/18CFRsDyg2/" target="_blank" style="color: #aaa; text-decoration: none; font-size: 14px;">زيارة البروفايل 👤</a>
        </div>
    </section>

    <div id="surprise-screen">
        <div class="video-container">
            <iframe id="main-player" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>
        
        <div class="info-panel">
            <div class="msg-text" id="msg-display"></div>
            
            <div class="counter-box">
                مستوى السعادة: <span id="count-number">0</span>%
            </div>

            <div class="action-btns">
                <button class="btn-retry" onclick="switchContent()">إعادة يا غادة 🔄</button>
                <button class="btn-close" onclick="closeSurprise()">خروج ✖</button>
            </div>
        </div>
    </div>

    <script>
        let count = 0;
        let currentVid = 0;
        const videos = [
            "https://streamable.com/e/2u533q?autoplay=1",
            "https://streamable.com/e/70ymh0?autoplay=1"
        ];
        
        const quotes = [
            "أنتِ النجمة التي تضيء سمائي يا غادة ✨",
            "ابتسامتكِ تساوي الكثير دائماً 💖",
            "غادة.. أنتِ الشخص الأكثر تميزاً 🌸",
            "في كل إعادة، يزداد جمالكِ في عيني 💎",
            "أنتِ كالفراشة الرقيقة يا غادة 🦋",
            "يومكِ سعيد كروحكِ الجميلة 🌹"
        ];

        function openSurprise() {
            document.getElementById('hero').style.transform = "scale(0.8) translateY(-100vh)";
            document.getElementById('surprise-screen').classList.add('active');
            switchContent();
        }

        function closeSurprise() {
            document.getElementById('hero').style.transform = "scale(1) translateY(0)";
            document.getElementById('surprise-screen').classList.remove('active');
            document.getElementById('main-player').src = "";
        }

        function switchContent() {
            // العداد
            count += 20;
            if(count > 100) count = 100;
            document.getElementById('count-number').innerText = count;

            // تبديل الفيديو
            const player = document.getElementById('main-player');
            player.src = videos[currentVid];
            currentVid = (currentVid + 1) % videos.length;

            // تبديل الجملة
            const msg = document.getElementById('msg-display');
            msg.innerText = quotes[Math.floor(Math.random() * quotes.length)];

            // مؤثرات الانفجار اللطيف
            burstHearts();
        }

        function burstHearts() {
            for(let i=0; i<30; i++) {
                const e = document.createElement('div');
                e.className = 'floating-emoji';
                e.innerHTML = ['❤️', '✨', '💖', '🌸'][Math.floor(Math.random()*4)];
                e.style.left = Math.random() * 100 + "vw";
                e.style.top = "-5vh";
                e.style.fontSize = (Math.random() * 20 + 20) + "px";
                e.style.animationDuration = (Math.random() * 2 + 2) + "s";
                document.body.appendChild(e);
                setTimeout(() => e.remove(), 4000);
            }
        }
    </script>
</body>
</html>
