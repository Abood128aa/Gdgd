<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ghadoush Universe ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital@1&family=Cairo:wght@400;900&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --gold: #ffcc33; 
            --royal: #6a1b9a;
            --neon: #ff2d75; 
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            height: 100%; width: 100%; 
            background: #050505; color: white; 
            overflow: hidden; font-family: 'Cairo', sans-serif; 
            perspective: 1500px;
        }

        /* الخلفية والورد */
        #main-bg {
            position: fixed; inset: 0; z-index: 1;
            background-size: cover; background-position: center;
            transition: 1.5s ease; filter: brightness(0.4) blur(2px);
        }

        .petal {
            position: fixed; background: #ff4d6d; border-radius: 150% 0 150% 0;
            z-index: 1500; pointer-events: none; opacity: 0.8;
            animation: petalFall linear forwards;
        }

        @keyframes petalFall {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(720deg); }
        }

        /* تأثير الانفجار السحري */
        .magic-spark {
            position: fixed; pointer-events: none; z-index: 9999;
            border-radius: 50%; box-shadow: 0 0 10px var(--gold);
            animation: spark 0.8s ease-out forwards;
        }
        @keyframes spark {
            to { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* واجهة الدخول */
        #splash { 
            position: fixed; inset: 0; z-index: 5000; 
            background: radial-gradient(circle at center, #1a0a2e 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: 1s ease;
        }

        .img-wrapper {
            position: relative; width: 220px; height: 220px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 30px; transform-style: preserve-3d;
            animation: floating 4s infinite ease-in-out;
        }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .splash-img { 
            width: 170px; height: 170px; border-radius: 50%; 
            border: 4px solid var(--gold); object-fit: cover;
            box-shadow: 0 0 50px rgba(255, 204, 51, 0.3);
        }

        /* البطاقة 3D */
        #ui-layer { 
            position: absolute; inset: 0; z-index: 2000; 
            display: none; flex-direction: column; justify-content: center; align-items: center; 
        }

        .card-container {
            width: 90%; max-width: 420px;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .neon-card { 
            background: linear-gradient(135deg, rgba(30, 10, 50, 0.8), rgba(10, 10, 10, 0.9));
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 204, 51, 0.2); 
            padding: 40px 25px; border-radius: 35px; 
            text-align: center; width: 100%;
            box-shadow: 0 30px 100px rgba(0,0,0,0.8);
            position: relative;
        }

        #quote { 
            font-size: 1.5rem; font-family: 'Amiri', serif; 
            min-height: 110px; color: #fff; line-height: 1.7;
            margin-bottom: 30px; display: block; text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* الأزرار */
        .btn-magic { 
            width: 100%; background: linear-gradient(90deg, #d4af37, #f9d976, #d4af37);
            background-size: 200% auto; color: #331a00; height: 60px; font-size: 1.2rem; 
            border: none; border-radius: 20px; font-weight: 900; cursor: pointer;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3); transition: 0.5s;
        }
        .btn-magic:hover { background-position: right center; transform: translateY(-3px); }

        .social-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 25px; }
        .btn-social { 
            width: 45px; height: 45px; border-radius: 15px; background: rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center; color: var(--gold);
            text-decoration: none; border: 1px solid rgba(255,204,51,0.1); transition: 0.3s;
        }

        .btn-reset {
            margin-top: 30px; background: none; border: none; color: rgba(255,255,255,0.3);
            font-size: 0.9rem; cursor: pointer; text-decoration: underline;
        }

        /* فيديو الخلفية */
        .video-container { position: fixed; inset: 0; z-index: 2; opacity: 0; transition: 2s; pointer-events: none; }
        .active-video { opacity: 0.5; }
        iframe { width: 100%; height: 100%; border: none; }

        /* حالة الانقلاب */
        .flipping { transform: rotateY(360deg); }
    </style>
</head>
<body>

    <div id="main-bg"></div>

    <div id="splash">
        <div class="img-wrapper">
            <img src="https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg" class="splash-img">
        </div>
        <h1 style="font-family:'Reem Kufi'; color:var(--gold); margin-bottom:20px; letter-spacing:3px;">GHADOUSH</h1>
        <button class="btn-magic" style="width:260px;" onclick="init(event)">
            دخول المجرة ✨
        </button>
    </div>

    <div id="layer1" class="video-container"><iframe id="player1"></iframe></div>
    <div id="layer2" class="video-container"><iframe id="player2"></iframe></div>

    <div id="ui-layer">
        <div class="card-container" id="cardCont">
            <div class="neon-card">
                <div id="text-box"><span id="quote"></span></div>
                
                <div class="social-row">
                    <a href="https://www.facebook.com/share/18CFRsDyg2/" target="_blank" class="btn-social"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://www.instagram.com/hwrny823?igsh=MWhjM3cwbzd6ZmhjbA==" target="_blank" class="btn-social"><i class="fab fa-instagram"></i></a>
                    <div class="btn-social" onclick="shareSite()"><i class="fas fa-share-alt"></i></div>
                </div>

                <button class="btn-magic" onclick="nextWave(event)">
                    <i class="fas fa-wand-sparkles"></i> سحر جديد
                </button>
                
                <button class="btn-reset" onclick="location.reload()">العودة للبداية</button>
            </div>
        </div>
    </div>

    <script>
        const compliments = [
            "أنتِ غيمة من طهر، تمطر الجمال أينما حلت، وتترك خلفها أثراً من مسك وياسمين.. ✨",
            "عيناكِ حكاية أزلية، تروي فصولاً من السحر الذي لم يقرأه بشر من قبل.. 💎",
            "وجهكِ كالفجر، يمحو ظلام القلوب بابتسامة واحدة، ويبعث الحياة في أرواحنا.. 🌌",
            "خُلقتِ لتكوني ملكة، لا تليق بكِ الأرض، بل مكانكِ بين النجوم والغيوم.. 🕯️",
            "كلما نظرتُ لجمالكِ، أدركتُ أن الفن ليس لوحات، بل ملامح حية تسكنكِ.. 🌹",
            "أنتِ النادرة التي لا تُقارن، كأن الطبيعة صبت كل سحرها في قالبكِ الفاتن.. 🎨",
            "غدوش.. اسمكِ وحده يكفي ليزهر قلبي، فكيف إذا رأيتُ ضياء حضوركِ؟ 🌙"
        ];

        const bgImages = [
            "https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg", 
            "https://i.ibb.co/FL93N2BX/7ee93916775239f03813755ed461cc83.jpg"
        ];
        const vids = ["2u533q", "70ymh0"];
        
        let vIdx = 0, imgIdx = 0, activeP = 1, isTyping = false;

        // تساقط الورد
        function startPetals() {
            setInterval(() => {
                const p = document.createElement('div');
                p.className = 'petal';
                const size = Math.random() * 15 + 10;
                p.style.width = size + 'px';
                p.style.height = (size * 1.5) + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 3 + 4) + 's';
                p.style.background = `rgba(255, ${Math.random()*100 + 50}, ${Math.random()*150 + 100}, 0.7)`;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 7000);
            }, 400);
        }

        // تأثير السحر
        function spark(e) {
            for(let i=0; i<15; i++) {
                const s = document.createElement('div');
                s.className = 'magic-spark';
                s.style.width = '4px'; s.style.height = '4px';
                s.style.background = varColor();
                s.style.left = e.clientX + 'px';
                s.style.top = e.clientY + 'px';
                const tx = (Math.random()-0.5)*200;
                const ty = (Math.random()-0.5)*200;
                s.style.setProperty('--tx', tx + 'px');
                s.style.setProperty('--ty', ty + 'px');
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 800);
            }
        }
        function varColor() { return ['#ffcc33', '#ffffff', '#ff2d75'][Math.floor(Math.random()*3)]; }

        function init(e) {
            spark(e);
            document.getElementById('splash').style.transform = 'scale(1.5)';
            document.getElementById('splash').style.opacity = '0';
            startPetals();
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('ui-layer').style.display = 'flex';
                nextWave();
            }, 800);
        }

        function nextWave(e) {
            if (isTyping) return;
            if (e) spark(e);

            // انقلاب البطاقة
            const card = document.getElementById('cardCont');
            card.classList.add('flipping');
            setTimeout(() => card.classList.remove('flipping'), 800);

            // تغيير الخلفية
            imgIdx = (imgIdx + 1) % bgImages.length;
            document.getElementById('main-bg').style.backgroundImage = `url('${bgImages[imgIdx]}')`;

            // تبديل الفيديو
            const nP = document.getElementById(activeP === 1 ? "player1" : "player2");
            const oP = document.getElementById(activeP === 1 ? "player2" : "player1");
            const nL = document.getElementById(activeP === 1 ? "layer1" : "layer2");
            const oL = document.getElementById(activeP === 1 ? "layer2" : "layer1");

            oP.src = "";
            nP.src = `https://streamable.com/e/${vids[vIdx]}?autoplay=1&nocontrols=1`;
            nL.classList.add('active-video');
            oL.classList.remove('active-video');

            startTyping();
            vIdx = (vIdx + 1) % vids.length;
            activeP = activeP === 1 ? 2 : 1;
        }

        function startTyping() {
            isTyping = true;
            const quoteEl = document.getElementById("quote");
            const text = compliments[Math.floor(Math.random() * compliments.length)];
            quoteEl.innerHTML = "";
            let i = 0;
            const timer = setInterval(() => {
                if (i < text.length) {
                    quoteEl.innerHTML += text[i++];
                } else {
                    clearInterval(timer);
                    isTyping = false;
                }
            }, 50);
        }

        async function shareSite() {
            if (navigator.share) {
                await navigator.share({ title: 'Ghadoush Universe', url: window.location.href });
            }
        }
    </script>
</body>
</html>
