<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ghadoush Universe ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Cairo:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #ff0055; --fb: #1877f2; --insta: #e4405f; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            height: 100%; width: 100%; 
            background: #000; color: white; 
            overflow: hidden; font-family: 'Cairo', sans-serif; 
        }

        #fade-overlay {
            position: fixed; inset: 0; background: black; z-index: 9999;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
        }

        #main-bg {
            position: fixed; inset: 0; z-index: 1;
            background-repeat: no-repeat; background-position: center center; background-size: cover;
            transition: background-image 1.2s ease-in-out;
            animation: slowZoom 25s infinite alternate ease-in-out;
        }
        @keyframes slowZoom { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

        #splash { 
            position: fixed; inset: 0; z-index: 5000; 
            background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            overflow: hidden;
        }

        /* حاوية الصورة مع النبض */
        .img-container {
            position: relative;
            z-index: 5002;
            animation: imgPulse 2s infinite ease-in-out;
            margin-bottom: 25px;
        }

        .splash-img { 
            width: 160px; height: 160px; border-radius: 50%; 
            border: 4px solid var(--neon); object-fit: cover;
            box-shadow: 0 0 30px var(--neon);
        }

        @keyframes imgPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px var(--neon)); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 25px var(--neon)); }
        }

        /* قلوب شاشة الترحيب الخلفية */
        .splash-heart {
            position: absolute; color: rgba(255, 0, 85, 0.3);
            font-size: 20px; pointer-events: none;
            animation: floatUp 4s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        #ui-layer { 
            position: absolute; inset: 0; z-index: 1000; 
            display: none; flex-direction: column; justify-content: flex-end; align-items: center; 
            padding-bottom: 5vh;
        }

        .neon-card { 
            background: rgba(0, 0, 0, 0.6); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 25px 20px; border-radius: 40px; 
            text-align: center; width: 92%; max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        #quote { 
            font-size: 1.8rem; font-weight: 900; 
            font-family: 'Lalezar', cursive;
            text-shadow: 0 0 15px var(--neon);
            display: block; min-height: 160px; 
            color: #fff; line-height: 1.4; margin-bottom: 15px;
        }

        .btn { border: none; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .social-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 12px; }
        .btn-social { height: 40px; flex: 1; border-radius: 12px; font-size: 1rem; color: white; text-decoration: none; }
        .btn-fb { background: var(--fb); }
        .btn-insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        
        .btn-magic { 
            width: 100%; background: #fff; color: #000; height: 55px; font-size: 1.3rem; 
            border-radius: 15px; font-weight: 900; box-shadow: 0 0 20px rgba(255,255,255,0.2);
            position: relative; z-index: 5005;
        }

        #beating-heart {
            font-size: 45px; color: var(--neon); cursor: pointer;
            animation: heartBeat 1.4s infinite; display: inline-block; margin-top: 10px;
        }
        @keyframes heartBeat { 0%, 100% { transform: scale(1); } 30% { transform: scale(1.25); } }

        .btn-back { margin-top: 15px; background: none; color: rgba(255,255,255,0.4); font-size: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.1); }

        .video-container { position: fixed; inset: 0; z-index: 2; opacity: 0; transition: opacity 1s; overflow: hidden; pointer-events: none; }
        .active-video { opacity: 0.5; z-index: 3; }
        iframe { width: 180vw; height: 180vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: none; }

        /* تساقط القلوب العام */
        .falling-heart {
            position: fixed; top: -10%; color: var(--neon);
            font-size: 20px; z-index: 8000; pointer-events: none;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .inner-heart { position: absolute; pointer-events: none; color: var(--neon); z-index: 2000; animation: heartFly 1.2s forwards; }
        @keyframes heartFly { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; } }

        .hide-card { opacity: 0 !important; transform: translateY(30px); pointer-events: none; }
    </style>
</head>
<body onmousedown="hideUI()" onmouseup="showUI()" ontouchstart="hideUI()" ontouchend="showUI()">

    <div id="fade-overlay"></div>
    <div id="main-bg"></div>

    <div id="splash">
        <script>
            for(let i=0; i<15; i++) {
                const h = document.createElement('div');
                h.className = 'splash-heart';
                h.innerHTML = '❤️';
                h.style.left = Math.random() * 100 + 'vw';
                h.style.animationDelay = Math.random() * 4 + 's';
                h.style.fontSize = (Math.random() * 20 + 15) + 'px';
                document.currentScript.parentNode.appendChild(h);
            }
        </script>
        
        <div class="img-container">
            <img src="https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg" class="splash-img">
        </div>
        
        <button class="btn btn-magic" style="width:260px; background: var(--neon); color: white;" onclick="init(event)">دخول كون غدوش ✨</button>
    </div>

    <div id="layer1" class="video-container"><iframe id="player1"></iframe></div>
    <div id="layer2" class="video-container"><iframe id="player2"></iframe></div>

    <div id="ui-layer">
        <div class="neon-card" id="mainCard" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
            <div id="text-box"><span id="quote"></span></div>
            
            <div class="social-row">
                <a href="https://www.facebook.com/share/18CFRsDyg2/" target="_blank" class="btn btn-social btn-fb"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/hwrny823?igsh=MWhjM3cwbzd6ZmhjbA==" target="_blank" class="btn btn-social btn-insta"><i class="fab fa-instagram"></i></a>
                <button class="btn btn-social" style="background: rgba(255,255,255,0.1);" onclick="shareSite(event)"><i class="fas fa-share-alt"></i></button>
            </div>

            <button class="btn btn-magic" onclick="nextWave(event)">سحر جديد 🪄</button>

            <center><div id="beating-heart" onclick="spawnHearts(event)">❤️</div></center>
            <button class="btn btn-back" onclick="location.reload()">إعادة البداية</button>
        </div>
    </div>

    <script>
        const compliments = [
            "غدوش.. أنتِ لستِ مجرد وجه جميل، أنتِ قصيدة كتبها القمر ونثرتها النجوم على الأرض ✨",
            "في عيونكِ يغرق الكلام، وفي حضوركِ يصمت الجمال خجلاً من رقتكِ العظيمة يا ملكة الكون 👑",
            "لو كان للجمال عنوان لكان اسمكِ، ولو كان للسحر موطن لكان بين تفاصيل ملامحكِ الفاتنة 🐚",
            "أنتِ النادرة التي لا تتكرر، كأنكِ خُلقتِ من خيوط الشمس ومن نقاء الغيم الأبيض ☁️",
            "حين تبتسمين، يزهر الورد في غير أوانه، ويتنفس العالم عطراً يشبه براءة قلبكِ النقي 🌹",
            "يا جميلة الروح والطلة، حضوركِ يطغى على كل الأضواء، وكأنكِ الشمس والآخرون كواكب تدور حولكِ ☀️",
            "غدوش.. أنتِ الاستثناء الوحيد في هذا العالم، فجمالكِ يفوق الخيال وسحركِ لا يدركه وصف 💎",
            "جمالكِ يا غدوش هو الفن الحقيقي، كلوحة رسمتها يد القدر لتبهر كل من ينظر إليها 🎨",
            "أنتِ النبض الذي يحيي الأمل، والوجه الذي يبث السكينة في القلوب المتعبة، أنتِ ببساطة معجزة ❤️",
            "يا قمر الليالي المظلمة، نوركِ يضيء الروح قبل الدروب، وضحكتكِ هي لحن السعادة الأجمل 🎶"
        ];

        const neonColors = ["#ff0055", "#00ffcc", "#fffb00", "#00ff00", "#ff00ff", "#50b7f5", "#ff8800"];
        const bgImages = ["https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg", "https://i.ibb.co/FL93N2BX/7ee93916775239f03813755ed461cc83.jpg"];
        const vids = ["2u533q", "70ymh0"];
        let vIdx = 0, imgIdx = 0, activeP = 1, isTyping = false;

        function hideUI() { document.getElementById('mainCard').classList.add('hide-card'); }
        function showUI() { document.getElementById('mainCard').classList.remove('hide-card'); }

        function rainHearts() {
            for(let i=0; i<30; i++) {
                setTimeout(() => {
                    const h = document.createElement('div');
                    h.className = 'falling-heart';
                    h.innerHTML = '❤️';
                    h.style.left = Math.random() * 100 + 'vw';
                    h.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    h.style.color = neonColors[Math.floor(Math.random() * neonColors.length)];
                    document.body.appendChild(h);
                    setTimeout(() => h.remove(), 4000);
                }, i * 50);
            }
        }

        function spawnHearts(e) {
            e.stopPropagation();
            for(let i=0; i<12; i++) {
                const h = document.createElement('div');
                h.className = 'inner-heart'; h.innerHTML = '❤️';
                h.style.left = '25px'; h.style.top = '10px';
                h.style.setProperty('--x', (Math.random()-0.5)*400 + 'px');
                h.style.setProperty('--y', (Math.random()-0.5)*400 - 150 + 'px');
                e.currentTarget.appendChild(h);
                setTimeout(() => h.remove(), 1200);
            }
        }

        function init(e) {
            e.stopPropagation();
            document.getElementById('splash').style.transition = '0.8s';
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('ui-layer').style.display = 'flex';
                nextWave();
            }, 800);
        }

        function nextWave(e) {
            if(e) e.stopPropagation();
            if(isTyping) return;
            
            rainHearts();

            const overlay = document.getElementById('fade-overlay');
            overlay.style.opacity = '0.7';
            setTimeout(() => {
                const clr = neonColors[Math.floor(Math.random()*neonColors.length)];
                document.documentElement.style.setProperty('--neon', clr);
                document.getElementById("quote").innerHTML = "";
                document.getElementById("quote").style.color = clr;
                
                imgIdx = (imgIdx + 1) % bgImages.length;
                document.getElementById('main-bg').style.backgroundImage = `url('${bgImages[imgIdx]}')`;
                
                const nP = activeP === 1 ? "player1" : "player2";
                const nL = activeP === 1 ? "layer1" : "layer2";
                const oL = activeP === 1 ? "layer2" : "layer1";
                
                document.getElementById(nP).src = `https://streamable.com/e/${vids[vIdx]}?autoplay=1&nocontrols=1`;
                document.getElementById(nL).classList.add('active-video');
                document.getElementById(oL).classList.remove('active-video');
                
                overlay.style.opacity = '0';
                startTyping();
                vIdx = (vIdx + 1) % vids.length; activeP = activeP === 1 ? 2 : 1;
            }, 400);
        }

        function startTyping() {
            isTyping = true;
            const text = compliments[Math.floor(Math.random()*compliments.length)];
            let i = 0;
            const inv = setInterval(() => {
                if(i < text.length) { document.getElementById("quote").innerHTML += text[i++]; }
                else { clearInterval(inv); isTyping = false; }
            }, 50);
        }

        async function shareSite(e) {
            e.stopPropagation();
            if (navigator.share) await navigator.share({ title: 'Ghadoush', url: window.location.href });
        }
    </script>
</body>
</html>
