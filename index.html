<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ghadoush Universe ✨</title>
    
    <link rel="manifest" href="manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ff0055">
    
    <link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Cairo:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --neon: #ff0055; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; color: white; overflow: hidden; font-family: 'Cairo', sans-serif; }

        /* الخلفية المتحركة */
        #main-bg {
            position: fixed; inset: 0; z-index: 1;
            background-image: url('https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg');
            background-size: cover; background-position: center;
            transition: background-image 1.2s ease;
            animation: slowZoom 20s infinite alternate ease-in-out;
        }
        @keyframes slowZoom { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* شاشة البداية */
        #splash { 
            position: fixed; inset: 0; z-index: 5000; background: #000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .splash-img { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--neon); box-shadow: 0 0 30px var(--neon); }

        /* بطاقة المحتوى */
        #ui-layer { position: absolute; inset: 0; z-index: 1000; display: none; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 40px; }
        .neon-card { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px); padding: 25px; border-radius: 30px; text-align: center; width: 90%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); }
        
        #quote { font-size: 1.5rem; font-family: 'Lalezar', cursive; min-height: 120px; display: block; margin-bottom: 20px; color: var(--neon); text-shadow: 0 0 10px rgba(255,0,85,0.5); }

        .btn-magic { width: 100%; background: var(--neon); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: 900; font-size: 1.2rem; cursor: pointer; }

        /* فيديوهات الطبقات */
        .video-container { position: fixed; inset: 0; z-index: 2; opacity: 0; transition: opacity 1s; }
        .active-video { opacity: 0.4; z-index: 3; }
        iframe { width: 100%; height: 100%; border: none; pointer-events: none; }

        /* القلوب المتساقطة */
        .falling-heart { position: fixed; top: -10%; z-index: 8000; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <div id="main-bg"></div>

    <div id="splash">
        <img src="https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg" class="splash-img">
        <button class="btn-magic" style="margin-top:30px; width:200px;" onclick="init()">دخول ✨</button>
    </div>

    <div id="layer1" class="video-container"></div>
    <div id="layer2" class="video-container"></div>

    <div id="ui-layer">
        <div class="neon-card">
            <span id="quote"></span>
            <button class="btn-magic" onclick="nextWave()">سحر جديد 🪄</button>
        </div>
    </div>

    <script>
        // تفعيل الـ Service Worker
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        const compliments = [
            "غدوش.. جمالكِ قصيدة لا تنتهي ✨",
            "أنتِ الاستثناء الجميل في هذا العالم 👑",
            "في عيونكِ يسكن سحر الكون يا غدوش 🐚",
            "يا قمر الليالي، نوركِ يضيء الروح ☀️"
        ];
        
        const vids = ["2u533q", "70ymh0"];
        let vIdx = 0;

        function init() {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            nextWave();
        }

        function nextWave() {
            rainHearts();
            const q = compliments[Math.floor(Math.random()*compliments.length)];
            document.getElementById('quote').innerText = q;

            // تبديل الفيديو
            const layer = vIdx % 2 === 0 ? 'layer1' : 'layer2';
            const other = vIdx % 2 === 0 ? 'layer2' : 'layer1';
            
            document.getElementById(layer).innerHTML = `<iframe src="https://streamable.com/e/${vids[vIdx % 2]}?autoplay=1&muted=1&nocontrols=1"></iframe>`;
            document.getElementById(layer).classList.add('active-video');
            document.getElementById(other).classList.remove('active-video');
            
            vIdx++;
        }

        function rainHearts() {
            for(let i=0; i<20; i++) {
                const h = document.createElement('div');
                h.className = 'falling-heart';
                h.innerHTML = '❤️';
                h.style.left = Math.random() * 100 + 'vw';
                h.style.fontSize = Math.random() * 20 + 10 + 'px';
                h.style.animationDuration = Math.random() * 2 + 2 + 's';
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 3000);
            }
        }
    </script>
</body>
</html>
