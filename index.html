<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghadoush Universe ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Cairo:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #ff0055; --gold: #ffd700; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; width: 100%; 
            background: #000; color: white; 
            overflow: hidden; font-family: 'Cairo', sans-serif; 
        }

        /* صورة الخلفية الثابتة والواضحة */
        #main-bg {
            position: fixed; inset: 0;
            background: url('https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg') no-repeat center center;
            background-size: cover;
            opacity: 0.4; /* وضوح متزن */
            z-index: 1;
        }

        /* طبقة الفيديو (شفافة جداً لتظهر الصورة خلفها) */
        .video-layer { position: fixed; inset: 0; z-index: 5; opacity: 0; transition: opacity 1s ease; }
        .active-video { opacity: 0.3; z-index: 6; }
        iframe { width: 100vw; height: 100vh; pointer-events: none; border: none; transform: scale(1.5); }

        /* شاشة البداية */
        #splash { 
            position: fixed; inset: 0; z-index: 2000; background: #000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }

        /* واجهة الأزرار */
        #ui-layer { 
            position: relative; z-index: 100; height: 100vh; 
            display: none; flex-direction: column; justify-content: center; align-items: center; 
        }

        .neon-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 40px 20px; border-radius: 50px;
            text-align: center; width: 90%; max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* حاوية النصوص المحترفة */
        #text-box { min-height: 150px; perspective: 1000px; overflow: hidden; }
        
        #quote {
            font-size: 2.2rem; font-weight: 900; line-height: 1.3;
            display: block; opacity: 0;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* أنيميشن الدخول */
        .slide-in { opacity: 1 !important; transform: translateY(0) rotateX(0deg); }
        .slide-out { opacity: 0 !important; transform: translateY(-30px) rotateX(-90deg); }

        #emoji { font-size: 3.5rem; margin-top: 15px; display: block; filter: drop-shadow(0 0 10px var(--neon)); }

        .btn {
            background: linear-gradient(45deg, var(--neon), #ff00ff);
            color: white; border: none; padding: 20px; border-radius: 60px;
            font-family: 'Lalezar'; font-size: 1.7rem; cursor: pointer;
            width: 100%; margin-top: 25px; transition: 0.3s;
            box-shadow: 0 10px 30px rgba(255, 0, 85, 0.4);
        }
        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        #fade-overlay { position: fixed; inset: 0; background: black; z-index: 1500; opacity: 0; pointer-events: none; transition: 0.5s; }
    </style>
</head>
<body>

    <div id="main-bg"></div>
    <div id="fade-overlay"></div>

    <div id="splash">
        <img src="https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg" style="width:150px; border-radius:50%; margin-bottom:20px; border:3px solid var(--neon);">
        <button class="btn" style="width:auto; padding:10px 40px;" onclick="init()">فتح عالم السحر ✨</button>
    </div>

    <div id="layer1" class="video-layer"><iframe id="player1" src="" allow="autoplay; fullscreen"></iframe></div>
    <div id="layer2" class="video-layer"><iframe id="player2" src="" allow="autoplay; fullscreen"></iframe></div>

    <div id="ui-layer">
        <div class="neon-card">
            <div id="text-box">
                <span id="quote">أنتِ حكاية لم يروِها زمن..</span>
                <span id="emoji">💎</span>
            </div>
            <button class="btn" onclick="nextWave()">المزيد من السحر 🔄</button>
        </div>
    </div>

    <script>
        const vids = ["2u533q", "70ymh0"];
        const colors = ["#00ffcc", "#ff0055", "#fffb00", "#0099ff", "#ff00ff", "#00ff00", "#ff8800"];
        
        const compliments = [
            {t: "أنتِ النور الذي يرفض الانطفاء في هذا العالم", e: "✨"},
            {t: "جمالكِ يتجاوز حدود الوصف ويكسر قواعد المنطق", e: "🌌"},
            {t: "في ملامحكِ هدوء البحر وفي روحكِ شموخ الجبال", e: "🌊"},
            {t: "كأنكِ قمرٌ سقط سهواً من السماء ليستقر في يومي", e: "🌙"},
            {t: "رقتكِ تجعل الورد ينحني خجلاً من حضوركِ الباهي", e: "🌷"},
            {t: "أنتِ القصيدة التي عجز أعظم الشعراء عن كتابتها", e: "✒️"},
            {t: "سحر عيونكِ يختصر ألف حكاية من العشق والجمال", e: "👁️"},
            {t: "خُلقتِ لتكوني ملكة، والتاج لا يليق إلا برأسكِ", e: "👑"},
            {t: "حضوركِ يملأ المكان بهجة، وغيابكِ يوقف نبض الزمان", e: "⏳"},
            {t: "أنتِ المعجزة التي تجعلني أؤمن أن الجمال لا يزال بخير", e: "🎁"},
            {t: "نظرة منكِ كفيلة بإعادة ترتيب الفوضى في قلبي", e: "🎯"},
            {t: "يا لؤلؤة نادرة وُجدت في أعماق روحٍ نقية", e: "🐚"},
            {t: "ابتسامتكِ هي اللحن الوحيد الذي لا أملّ من سماعه", e: "🎶"},
            {t: "كأنكِ نُسجتِ من خيوط الشمس ومن ضياء الفجر", e: "🌅"},
            {t: "أنتِ الملاذ الآمن والوطن الذي لا يُغادره القلب", e: "🏡"},
            {t: "تفاصيلكِ الصغيرة هي أعظم انتصاراتي في هذه الحياة", e: "🎖️"},
            {t: "كلما مر ذكركِ، فاحت الأرض بعطر الريحان والياسمين", e: "🌿"},
            {t: "أنتِ لستِ مجرد صدفة، أنتِ قدرٌ جميل طال انتظاره", e: "🎈"},
            {t: "جمالكِ لا يشيخ، بل يزداد مع كل ثانية عظمة ورُقياً", e: "💎"},
            {t: "يا سيدة القلب، دلالكِ هو الفتنة التي أهواها", e: "💘"},
            {t: "بين يديكِ يهدأ صخب العالم وتستريح الروح", e: "🕊️"},
            {t: "أنتِ النجمة التي تُرشد التائهين في عتمة الليالي", e: "⭐"},
            {t: "روحكِ النقية هي التي تمنح الأشياء من حولكِ بريقاً", e: "🔮"},
            {t: "لا مثيل لكِ، فأنتِ النسخة الوحيدة والأصلية للكمال", e: "📜"},
            {t: "فداكِ العمر، فأنتِ الحياة وكل ما يأتي بعدها", e: "💍"},
            {t: "حين تضحكين، يبتسم القدر وتتفتح براعم الأمل", e: "🌻"},
            {t: "أنتِ السحر الحلال الذي يسلب الألباب دون عناء", e: "🧿"},
            {t: "جمالكِ هادئ كالفجر، ولكنه عميق كالمحيط الكبير", e: "🌊"},
            {t: "يا عسلاً مصفى يشفي الروح من متاعب الحياة", e: "🍯"},
            {t: "أنتِ الملهمة التي تجعل المستحيل يبدو ممكناً", e: "🚀"},
            {t: "يا وجهاً يعيد لي طفولتي ودهشتي الأولى بالأشياء", e: "🧸"},
            {t: "أنتِ الأناقة التي لا تشتريها الأموال، بل تمنحها الروح", e: "👗"},
            {t: "في قربكِ تشرق الشمس، وفي بعدكِ يحل الخريف", e: "🍂"},
            {t: "يا غصناً ليناً يتمايل بجماله في بستان قلبي", e: "🌳"},
            {t: "أنتِ الحلم الذي استيقظتُ لأجده حقيقةً أمامي", e: "🎐"},
            {t: "سلطانة في مملكتكِ، ولكِ منا الولاء والحب الأبدي", e: "⚜️"},
            {t: "لا تحزني، فوجهكِ خُلق ليضحك والكون ليحتفي بكِ", e: "🌈"},
            {t: "جمالكِ يجدد إيماني بأن الله جميل يحب الجمال", e: "🕌"},
            {t: "أنتِ الختام المسك لكل الأشياء الجميلة في عيني", e: "🕯️"},
            {t: "دمتِ لي حباً لا ينتهي، وجمالاً لا يذبل أبداً", e: "♾️"}
        ];

        let vIdx = 0;
        let activeP = 1;

        function init() {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            nextWave(true);
        }

        function nextWave(isFirst = false) {
            const quote = document.getElementById('quote');
            const emoji = document.getElementById('emoji');
            
            if(!isFirst) quote.className = 'slide-out';

            setTimeout(() => {
                const nextPId = activeP === 1 ? "player1" : "player2";
                const nextLId = activeP === 1 ? "layer1" : "layer2";
                const otherLId = activeP === 1 ? "layer2" : "layer1";

                document.getElementById(nextPId).src = `https://streamable.com/e/${vids[vIdx]}?autoplay=1&nocontrols=1`;
                document.getElementById(nextLId).classList.add('active-video');
                document.getElementById(otherLId).classList.remove('active-video');

                // تحديث المحتوى
                const randomComp = compliments[Math.floor(Math.random() * compliments.length)];
                quote.innerText = randomComp.t;
                emoji.innerText = randomComp.e;
                quote.style.color = colors[Math.floor(Math.random() * colors.length)];

                // تفعيل أنيميشن الدخول
                quote.className = 'slide-in';

                vIdx = (vIdx + 1) % vids.length;
                activeP = activeP === 1 ? 2 : 1;
            }, isFirst ? 0 : 600);
        }
    </script>
</body>
</html>
