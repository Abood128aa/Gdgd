<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghadoush Universe ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Cairo:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #ff0055; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; width: 100%; 
            background: #000; color: white; 
            overflow: hidden; font-family: 'Cairo', sans-serif; 
        }

        #main-bg {
            position: fixed; inset: 0;
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            opacity: 0.9; 
            z-index: 1;
            transition: background-image 1s ease-in-out;
            animation: moveZoom 12s infinite alternate ease-in-out;
        }

        @keyframes moveZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.2); }
        }

        /* شاشة البداية */
        #splash { 
            position: fixed; inset: 0; z-index: 2000; 
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: opacity 0.8s;
        }

        /* نمط القلوب المتساقطة */
        .heart {
            position: absolute;
            color: var(--neon);
            font-size: 20px;
            user-select: none;
            pointer-events: none;
            z-index: 2001;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .splash-img {
            width: 180px; height: 180px;
            border-radius: 50%; 
            border: 4px solid var(--neon);
            margin-bottom: 30px; 
            box-shadow: 0 0 30px var(--neon);
            object-fit: cover;
            z-index: 2002;
        }

        .video-container {
            position: fixed; inset: 0; z-index: 2;
            opacity: 0; transition: opacity 1s;
            overflow: hidden; pointer-events: none;
        }
        .active-video { opacity: 0.4; z-index: 3; }
        
        iframe { 
            width: 170vw; height: 170vh; 
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border: none; 
        }

        #ui-layer { 
            position: relative; z-index: 1000; height: 100vh;
            display: none; flex-direction: column; justify-content: center; align-items: center; 
        }

        .neon-card {
            background: rgba(0, 0, 0, 0.2); 
            backdrop-filter: blur(8px);
            border: 2px solid var(--neon);
            padding: 25px 20px; border-radius: 40px;
            text-align: center; width: 90%; max-width: 420px;
        }

        #quote { 
            font-size: 1.8rem; font-weight: 900; 
            text-shadow: 2px 2px 10px #000, -2px -2px 10px #000;
        }

        .btn {
            background: var(--neon); color: white; border: none; padding: 15px; 
            border-radius: 50px; font-family: 'Lalezar'; font-size: 1.4rem; 
            cursor: pointer; width: 100%; display: block;
            text-decoration: none; box-shadow: 0 8px 20px rgba(255, 0, 85, 0.5);
            transition: 0.3s; margin-top: 12px;
            z-index: 2002;
        }
        .btn:active { transform: scale(0.95); }

        .btn-fb { background: #1877f2; font-size: 1.1rem; }
        .btn-insta { 
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); 
            font-size: 1.1rem; 
        }
        
        .btn-back { background: rgba(0,0,0,0.4); border: 1px solid #666; color: #fff; font-size: 0.9rem; margin-top: 15px; border-radius: 50px; cursor: pointer; padding: 8px 20px; }
    </style>
</head>
<body>

    <div id="main-bg"></div>

    <div id="splash">
        <img src="https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg" class="splash-img">
        <button class="btn" style="width:280px;" onclick="init()">دخول عالم غدوش ✨</button>
    </div>

    <div id="layer1" class="video-container"><iframe id="player1" src="" allow="autoplay"></iframe></div>
    <div id="layer2" class="video-container"><iframe id="player2" src="" allow="autoplay"></iframe></div>

    <div id="ui-layer">
        <div class="neon-card" id="card">
            <div id="text-box" style="min-height: 130px; display: flex; flex-direction: column; justify-content: center;">
                <span id="quote"></span>
                <span style="font-size: 2.5rem; display: block; margin-top: 5px; filter: drop-shadow(0 0 10px black);">👑</span>
            </div>
            
            <button class="btn" onclick="nextWave()">تغيير السحر 🔄</button>
            <a href="https://www.facebook.com/share/18CFRsDyg2/" target="_blank" class="btn btn-fb">👤 فيسبوك غدوش</a>
            <a href="https://www.instagram.com/hwrny823?igsh=MWhjM3cwbzd6ZmhjbA==" target="_blank" class="btn btn-insta">📸 إنستغرام غدوش</a>
            
            <center><button class="btn-back" onclick="location.reload()">🔙 رجوع</button></center>
        </div>
    </div>

    <script>
        const bgImages = [
            "https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg", 
            "https://i.ibb.co/FL93N2BX/7ee93916775239f03813755ed461cc83.jpg"
        ];
        
        const vids = ["2u533q", "70ymh0"];
        const colors = ["#00ffcc", "#ff0055", "#fffb00", "#ff00ff", "#50b7f5", "#00ff00", "#ff8800"];
        const compliments = ["غدوش.. جمالكِ يدرس للأجيال ✨", "حضوركِ يطغى على ضوء القمر 🌙", "رقتكِ تضاهي رقة الورد 🌹", "أنتِ القصيدة التي عجز الشعراء عنها ✒️", "يا لؤلؤة نادرة تلمع في القلب 🐚", "خُلقتِ لتكوني ملكة 👑"];

        let vIdx = 0; 
        let imgIdx = 0; 
        let activeP = 1; 
        let isTyping = false;
        let heartInterval;

        // وظيفة إنشاء القلوب المتساقطة
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.opacity = Math.random();
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            
            document.getElementById('splash').appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        window.onload = () => {
            document.getElementById('main-bg').style.backgroundImage = `url('${bgImages[0]}')`;
            // البدء في تساقط القلوب كل 300 مللي ثانية
            heartInterval = setInterval(createHeart, 300);
        };

        function init() {
            clearInterval(heartInterval); // إيقاف إنتاج القلوب عند الدخول
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('ui-layer').style.display = 'flex';
                nextWave(true);
            }, 800);
        }

        function typeWriter(text, i) {
            if (i < text.length) {
                document.getElementById("quote").innerHTML += text.charAt(i);
                setTimeout(() => typeWriter(text, i + 1), 50);
            } else { isTyping = false; }
        }

        function nextWave(isFirst = false) {
            if(isTyping) return;
            document.getElementById("quote").innerHTML = "";
            isTyping = true;

            if (!isFirst) {
                imgIdx = (imgIdx + 1) % bgImages.length;
                document.getElementById('main-bg').style.backgroundImage = `url('${bgImages[imgIdx]}')`;
            }

            setTimeout(() => {
                const oldP = activeP === 1 ? "player2" : "player1";
                document.getElementById(oldP).src = "";
                const nextP = activeP === 1 ? "player1" : "player2";
                const nextL = activeP === 1 ? "layer1" : "layer2";
                const otherL = activeP === 1 ? "layer2" : "layer1";

                document.getElementById(nextP).src = `https://streamable.com/e/${vids[vIdx]}?autoplay=1&nocontrols=1`;
                document.getElementById(nextL).classList.add('active-video');
                document.getElementById(otherL).classList.remove('active-video');

                const randomText = compliments[Math.floor(Math.random() * compliments.length)];
                document.getElementById("quote").style.color = colors[Math.floor(Math.random() * colors.length)];
                typeWriter(randomText, 0);

                vIdx = (vIdx + 1) % vids.length;
                activeP = activeP === 1 ? 2 : 1;
            }, isFirst ? 0 : 300);
        }
    </script>
</body>
</html>
