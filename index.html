<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة غدوش 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&family=Amiri:wght@700&family=Cairo:wght@900&family=Reem+Kufi:wght@700&family=Lalezar&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff4d6d; --fb: #1877f2; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Tajawal', sans-serif; background: #000; overflow: hidden; }

        /* الشاشة الرئيسية */
        .hero {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2; transition: 0.8s ease-in-out;
        }

        .heart-beat {
            font-size: 120px; cursor: pointer; animation: beat 1.2s infinite;
            filter: drop-shadow(0 0 30px var(--p)); margin-bottom: 30px;
        }

        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.25); } }

        /* أزرار عملاقة واحترافية */
        .btn-giant {
            background: var(--p); color: white; border: none; 
            padding: 25px 60px; border-radius: 60px; font-size: 26px; 
            font-weight: 900; cursor: pointer; transition: 0.4s;
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.5);
            text-decoration: none; display: inline-block;
        }
        .btn-giant:hover { transform: scale(1.1) translateY(-5px); background: #fff; color: var(--p); }

        .btn-fb {
            background: var(--fb); font-size: 18px; padding: 15px 40px; 
            margin-top: 20px; border-radius: 50px; color: white; text-decoration: none;
            font-weight: bold; box-shadow: 0 10px 20px rgba(24, 119, 242, 0.3);
        }

        /* شاشة المفاجأة يا غدوش */
        #surprise-screen {
            position: fixed; top: 100%; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10; display: flex; flex-direction: column;
            transition: top 0.7s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .active-screen { top: 0 !important; }

        .video-box { width: 100%; height: 60vh; background: #000; border-bottom: 3px solid var(--p); }
        iframe { width: 100%; height: 100%; border: none; }

        .controls {
            flex: 1; padding: 20px; text-align: center; color: white;
            background: linear-gradient(0deg, #111 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; gap: 20px;
        }

        /* حاوية النص المتغيرة الخطوط */
        #msg-text { 
            font-size: 2.2rem; font-weight: 900; min-height: 100px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.5s ease;
        }

        .btn-retry {
            background: white; color: black; padding: 22px 60px; border-radius: 50px;
            font-weight: 900; border: none; cursor: pointer; font-size: 24px;
            box-shadow: 0 10px 30px rgba(255,255,255,0.2); transition: 0.3s;
        }
        .btn-retry:active { transform: scale(0.9); }

        .stats { font-size: 16px; color: #ffbcc9; font-weight: bold; letter-spacing: 1px; }
        #counter { font-size: 24px; color: white; }

        .floating { position: absolute; pointer-events: none; animation: fall 3s linear forwards; z-index: 100; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <div class="hero" id="hero">
        <div class="heart-beat" onclick="start()">❤️</div>
        <button class="btn-giant" onclick="start()">افتحي المفاجأة يا غدوش 🎁</button>
        <a href="https://www.facebook.com/share/18CFRsDyg2/" target="_blank" class="btn-fb">👤 بروفايل فيسبوك</a>
    </div>

    <div id="surprise-screen">
        <div class="video-box">
            <iframe id="player" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>
        <div class="controls">
            <div id="msg-text">جاهزة يا غدوش؟</div>
            <div class="stats">حُب غدوش في قلبي: <span id="counter">0</span>%</div>
            <button class="btn-retry" onclick="nextAction()">إعادة يا غدوش 🔄</button>
            <div onclick="exit()" style="cursor:pointer; font-size: 14px; color: #444; margin-top: 10px;">إغلاق</div>
        </div>
    </div>

    <script>
        let score = 0;
        let vIndex = 0;
        const vids = [
            "https://streamable.com/e/2u533q?autoplay=1",
            "https://streamable.com/e/70ymh0?autoplay=1"
        ];
        
        const quotes = [
            "أنتِ النور الذي يضيء أيامي يا غدوش ✨",
            "كل إعادة هي فرصة لأقول أنكِ مذهلة 💖",
            "ابتسامتكِ يا غدوش هي سر سعادتي 🌸",
            "غدوش.. قطعة من السكر في هذا العالم 🍬",
            "لا يوجد جمال يشبه جمال روحكِ 🦋",
            "غدوش الأميرة دائماً وأبداً 👑",
            "أنتِ النادرة التي لا تتكرر 💎"
        ];

        // مصفوفة الخطوط والألوان
        const fonts = ["'Lalezar', cursive", "'Cairo', sans-serif", "'Amiri', serif", "'Reem Kufi', sans-serif", "'Tajawal', sans-serif"];
        const colors = ["#ff4d6d", "#ff8fa3", "#ffb3c1", "#ffffff", "#ffd1dc"];

        function start() {
            document.getElementById('surprise-screen').classList.add('active-screen');
            nextAction();
        }

        function nextAction() {
            // تحديث العداد
            score = Math.min(score + 20, 100);
            document.getElementById('counter').innerText = score;

            // تبديل الفيديو
            document.getElementById('player').src = vids[vIndex];
            vIndex = (vIndex + 1) % vids.length;

            // تبديل النص والخط
            const msg = document.getElementById('msg-text');
            msg.innerText = quotes[Math.floor(Math.random() * quotes.length)];
            msg.style.fontFamily = fonts[Math.floor(Math.random() * fonts.length)];
            msg.style.color = colors[Math.floor(Math.random() * colors.length)];
            msg.style.fontSize = (Math.floor(Math.random() * 10) + 30) + "px"; // عريض ومتغير الحجم

            // تأثير القلوب
            for(let i=0; i<35; i++) {
                const h = document.createElement('div');
                h.className = 'floating';
                h.innerHTML = ['❤️', '💖', '✨', '🌸'][Math.floor(Math.random()*4)];
                h.style.left = Math.random() * 100 + 'vw';
                h.style.top = '-5vh';
                h.style.fontSize = (Math.random()*25+20)+'px';
                h.style.animationDuration = (Math.random()*2+2.5)+'s';
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 3500);
            }
        }

        function exit() {
            document.getElementById('surprise-screen').classList.remove('active-screen');
            document.getElementById('player').src = "";
        }
    </script>
</body>
</html>
