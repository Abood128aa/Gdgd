<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ghadoush Universe ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital@1&family=Cairo:wght@400;900&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --gold: #ffd700; 
            --neon: #ff2d75; 
            --glass: rgba(255, 255, 255, 0.1);
            --bg-dark: #0a0a0a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            height: 100%; width: 100%; 
            background: var(--bg-dark); color: white; 
            overflow: hidden; font-family: 'Cairo', sans-serif; 
        }

        /* الخلفية المتحركة */
        #main-bg {
            position: fixed; inset: 0; z-index: 1;
            background-size: cover; background-position: center;
            transition: transform 2s ease, filter 1.5s ease, background-image 1.5s ease;
            filter: brightness(0.5) contrast(1.1);
        }

        /* تأثير الجزيئات السحرية */
        .magic-particle {
            position: fixed; pointer-events: none;
            border-radius: 50%; z-index: 9999;
            animation: flyParticle 1s ease-out forwards;
        }

        @keyframes flyParticle {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--mx), var(--my)) scale(0); opacity: 0; }
        }

        /* واجهة الدخول */
        #splash { 
            position: fixed; inset: 0; z-index: 5000; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }

        .img-wrapper {
            position: relative; width: 240px; height: 240px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 40px;
        }

        .orbit {
            position: absolute; width: 100%; height: 100%;
            border: 2px dashed var(--neon); border-radius: 50%;
            animation: rotate 15s linear infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .splash-img { 
            width: 180px; height: 180px; border-radius: 50%; 
            border: 3px solid #fff; object-fit: cover;
            box-shadow: 0 0 40px rgba(255, 45, 117, 0.5);
            z-index: 2;
        }

        /* البطاقة الرئيسية */
        #ui-layer { 
            position: absolute; inset: 0; z-index: 1000; 
            display: none; flex-direction: column; justify-content: center; align-items: center; 
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.8));
        }

        .neon-card { 
            background: rgba(15, 15, 15, 0.7); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            padding: 40px 25px; border-radius: 30px; 
            text-align: center; width: 90%; max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,1);
            transform: translateY(0); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #quote { 
            font-size: 1.6rem; font-weight: 400; 
            font-family: 'Amiri', serif; font-style: italic;
            min-height: 120px; color: #efefef; line-height: 1.6;
            margin-bottom: 30px; display: block;
        }

        /* الأزرار الاحترافية */
        .btn-magic { 
            width: 100%; background: linear-gradient(45deg, var(--neon), #ff8a00);
            color: white; height: 60px; font-size: 1.2rem; border: none;
            border-radius: 18px; font-weight: 900; cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 45, 117, 0.3);
            transition: 0.3s; position: relative; overflow: hidden;
        }

        .btn-magic:active { transform: scale(0.95); }

        .social-row { display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; }
        .btn-social { 
            width: 50px; height: 50px; border-radius: 50%; background: var(--glass);
            display: flex; align-items: center; justify-content: center; color: white;
            text-decoration: none; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .btn-social:hover { background: var(--neon); }

        /* فيديوهات الخلفية */
        .video-container { position: fixed; inset: 0; z-index: 2; opacity: 0; transition: 1.5s; pointer-events: none; }
        .active-video { opacity: 0.4; }
        iframe { width: 200%; height: 200%; position: absolute; top: -50%; left: -50%; }

        .hide-card { opacity: 0; transform: translateY(50px) scale(0.9); }
    </style>
</head>
<body>

    <div id="main-bg"></div>

    <div id="splash">
        <div class="img-wrapper">
            <div class="orbit"></div>
            <img src="https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg" class="splash-img">
        </div>
        <button class="btn-magic" style="width:280px;" onclick="init(event)">
            استكشاف العالم ✨
        </button>
    </div>

    <div id="layer1" class="video-container"><iframe id="player1"></iframe></div>
    <div id="layer2" class="video-container"><iframe id="player2"></iframe></div>

    <div id="ui-layer">
        <div class="neon-card" id="mainCard">
            <div id="text-box"><span id="quote"></span></div>
            
            <div class="social-row">
                <a href="https://www.facebook.com/share/18CFRsDyg2/" target="_blank" class="btn-social"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/hwrny823?igsh=MWhjM3cwbzd6ZmhjbA==" target="_blank" class="btn-social"><i class="fab fa-instagram"></i></a>
                <div class="btn-social" onclick="shareSite()"><i class="fas fa-paper-plane"></i></div>
            </div>

            <button class="btn-magic" onclick="nextWave(event)">
                <i class="fas fa-wand-magic-sparkles"></i> سحر جديد
            </button>
            
            <p style="margin-top: 20px; font-size: 0.7rem; opacity: 0.4; letter-spacing: 2px;">GHADOUSH EXCLUSIVE</p>
        </div>
    </div>

    <script>
        const compliments = [
            "ثمة أرواح كالموسيقى، تعزف الأمل في قلوبنا بغير قصد، وأنتِ يا غدوش أعذب سيمفونية.. ✨",
            "يقولون أن الجمال نسبي، لكنهم لم يروكِ بعد؛ فأنتِ المطلق الذي لا يقبل القسمة على اثنين.. 💎",
            "في ملامحكِ هدوء الفجر، وفي عينيكِ صخب النجوم، كأنكِ اختصار لكل ما هو فاتن في هذا العالم.. 🌌",
            "أنتِ لستِ صدفة جميلة، أنتِ دعوة مستجابة في ليلة قدر، ونور يضيء عتمة المسافات.. 🕯️",
            "تتفتح الأزهار خجلاً عند مروركِ، فكيف لوردة أن تصمد أمام سلطان حضوركِ الطاغي؟ 🌹",
            "غدوش.. أنتِ القصيدة التي عجز الشعراء عن كتابتها، واللوحة التي لم يجرؤ فنان على رسمها.. 🎨",
            "كأنكِ خُلقتِ من خيوط القمر، رقيقة لدرجة أن النسيم يغار من ملامستكِ.. 🌙",
            "حضوركِ يمنح الأمكنة روحاً، وضحكتكِ تعيد ترتيب الفوضى في هذا الكون المتعب.. ❤️"
        ];

        const bgImages = [
            "https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg", 
            "https://i.ibb.co/FL93N2BX/7ee93916775239f03813755ed461cc83.jpg"
        ];
        const vids = ["2u533q", "70ymh0"];
        
        let vIdx = 0, imgIdx = 0, activeP = 1, isTyping = false;

        // أنيمايشن الجزيئات السحرية
        function createMagic(x, y) {
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'magic-particle';
                const size = Math.random() * 8 + 4;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.background = `hsla(${Math.random() * 360}, 100%, 70%, 1)`;
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                
                const mx = (Math.random() - 0.5) * 300;
                const my = (Math.random() - 0.5) * 300;
                p.style.setProperty('--mx', mx + 'px');
                p.style.setProperty('--my', my + 'px');
                
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1000);
            }
        }

        function init(e) {
            createMagic(e.clientX, e.clientY);
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('ui-layer').style.display = 'flex';
                nextWave();
            }, 600);
        }

        function nextWave(e) {
            if (isTyping) return;
            if (e) createMagic(e.clientX, e.clientY);

            // تدوير الخلفية
            imgIdx = (imgIdx + 1) % bgImages.length;
            const bg = document.getElementById('main-bg');
            bg.style.backgroundImage = `url('${bgImages[imgIdx]}')`;
            bg.style.transform = `scale(1.1) rotate(${Math.random()*2 - 1}deg)`;

            // تبديل الفيديو بسلاسة
            const nP = document.getElementById(activeP === 1 ? "player1" : "player2");
            const oP = document.getElementById(activeP === 1 ? "player2" : "player1");
            const nL = document.getElementById(activeP === 1 ? "layer1" : "layer2");
            const oL = document.getElementById(activeP === 1 ? "layer2" : "layer1");

            oP.src = "";
            nP.src = `https://streamable.com/e/${vids[vIdx]}?autoplay=1&nocontrols=1`;
            
            nL.classList.add('active-video');
            oL.classList.remove('active-video');

            startTyping();
            
            vIdx = (vIdx + 1) % vids.length;
            activeP = activeP === 1 ? 2 : 1;
        }

        function startTyping() {
            isTyping = true;
            const quoteEl = document.getElementById("quote");
            quoteEl.style.opacity = '0';
            
            setTimeout(() => {
                const text = compliments[Math.floor(Math.random() * compliments.length)];
                quoteEl.innerHTML = "";
                quoteEl.style.opacity = '1';
                let i = 0;
                const timer = setInterval(() => {
                    if (i < text.length) {
                        quoteEl.innerHTML += text[i++];
                    } else {
                        clearInterval(timer);
                        isTyping = false;
                    }
                }, 40);
            }, 300);
        }

        async function shareSite() {
            if (navigator.share) {
                await navigator.share({ title: 'Ghadoush Universe', url: window.location.href });
            } else {
                alert("تم نسخ الرابط بنجاح! ✨");
            }
        }
    </script>
</body>
</html>
