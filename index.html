<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghadoush Universe ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Cairo:wght@900&family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #ff0055;
            --neon-bg: rgba(255, 0, 85, 0.2);
            --glass: rgba(0, 0, 0, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html { 
            height: 100%; width: 100%; 
            font-family: 'Tajawal', sans-serif; 
            background: #000; overflow: hidden;
        }

        /* حاوية الفيديو العملاقة - ملء الشاشة */
        #video-bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }
        #video-bg-container iframe {
            width: 100vw; height: 100vh;
            transform: scale(1.5); /* لإخفاء حواف المشغل */
            pointer-events: none;
        }

        /* واجهة التحكم العلوية */
        .top-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 6px;
            background: rgba(255,255,255,0.1); z-index: 1000;
        }
        #progress-line {
            height: 100%; width: 0%; background: var(--neon);
            box-shadow: 0 0 15px var(--neon); transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* الطبقة الشفافة فوق الفيديو */
        .overlay-content {
            position: relative; z-index: 100; height: 100vh;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 40px 20px;
            background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.8));
            transition: opacity 1s;
        }

        /* نص الجملة الاحترافي */
        #dynamic-quote {
            text-align: center; color: white; font-weight: 900;
            text-shadow: 0 0 20px rgba(0,0,0,0.8), 0 0 40px var(--neon);
            max-width: 90%; line-height: 1.4;
            opacity: 0; transform: translateY(20px);
            transition: all 0.6s ease;
        }

        /* زر الإعادة المصغر والاحترافي */
        .retry-circle {
            width: 70px; height: 70px;
            background: var(--glass);
            border: 2px solid var(--neon);
            border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px var(--neon-bg);
            margin-bottom: 20px;
        }
        .retry-circle:hover { transform: scale(1.1) rotate(180deg); background: var(--neon); }
        .retry-circle span { font-size: 10px; color: white; font-weight: bold; margin-top: 2px; }

        /* الشاشة الافتتاحية */
        #welcome-screen {
            position: fixed; inset: 0; z-index: 2000;
            background: radial-gradient(circle at center, #111, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 1s cubic-bezier(1, 0, 0, 1);
        }
        .main-btn {
            background: transparent; color: white; border: 2px solid var(--neon);
            padding: 20px 50px; border-radius: 50px; font-size: 24px; font-family: 'Lalezar';
            cursor: pointer; box-shadow: 0 0 30px var(--neon-bg);
            transition: 0.3s;
        }
        .main-btn:hover { background: var(--neon); transform: scale(1.05); }

        /* قلوب وانفجارات */
        .heart-pop {
            position: absolute; pointer-events: none;
            animation: popOut 1s ease-out forwards;
        }
        @keyframes popOut {
            0% { transform: scale(0) translate(0,0); opacity: 1; }
            100% { transform: scale(1.5) translate(var(--tx), var(--ty)); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="top-bar"><div id="progress-line"></div></div>

    <div id="welcome-screen">
        <div style="font-size: 80px; margin-bottom: 20px;">🌹</div>
        <button class="main-btn" onclick="initExperience()">عالم غدوش الخرافي ✨</button>
    </div>

    <div id="video-bg-container">
        <iframe id="cinema-engine" src="" frameborder="0" allow="autoplay; fullscreen"></iframe>
    </div>

    <div class="overlay-content" id="ui-layer" style="display: none;">
        <div></div> <h1 id="dynamic-quote"></h1>

        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="retry-circle" onclick="nextWave()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                <span>إعادة</span>
            </div>
            <p style="color: rgba(255,255,255,0.5); font-size: 12px; letter-spacing: 2px;">LVL: <span id="lvl-text">1</span></p>
        </div>
    </div>

    <script>
        let waveCount = 0;
        let vIndex = 0;
        const vids = ["2u533q", "70ymh0"]; // أكواد الفيديو فقط للسرعة
        const quotes = [
            "أنتِ الأجمل في هذا الكون يا غدوش 🌌",
            "سحر عينيكِ يغلب كل الفيديوهات 💖",
            "غدوش.. الملكة التي لا تُقهر 👑",
            "طاقة جمالكِ وصلت للمستوى الأقصى ⚡",
            "كل ثانية معكِ هي حياة كاملة ✨"
        ];
        const fonts = ["'Lalezar'", "'Cairo'", "'Tajawal'"];

        function initExperience() {
            document.getElementById('welcome-screen').style.transform = "translateY(-100%)";
            document.getElementById('ui-layer').style.display = 'flex';
            nextWave();
        }

        function nextWave() {
            waveCount++;
            
            // تحديث العداد العلوي
            const bar = document.getElementById('progress-line');
            bar.style.width = (waveCount * 20) % 105 + "%";
            document.getElementById('lvl-text').innerText = waveCount;

            // تحديث الفيديو كخلفية
            const engine = document.getElementById('cinema-engine');
            engine.src = `https://streamable.com/e/${vids[vIndex]}?autoplay=1&nocontrols=1&loop=1`;
            vIndex = (vIndex + 1) % vids.length;

            // تحديث النص بتأثير انيميشن
            const text = document.getElementById('dynamic-quote');
            text.style.opacity = 0;
            text.style.transform = "translateY(20px)";
            
            setTimeout(() => {
                text.innerText = quotes[Math.floor(Math.random() * quotes.length)];
                text.style.fontFamily = fonts[Math.floor(Math.random() * fonts.length)];
                text.style.fontSize = (Math.random() * 10 + 35) + "px";
                text.style.opacity = 1;
                text.style.transform = "translateY(0)";
            }, 500);

            // انفجار القلوب
            for(let i=0; i<20; i++) spawnHeart();
        }

        function spawnHeart() {
            const h = document.createElement('div');
            h.className = 'heart-pop';
            h.innerHTML = ['❤️','✨','💖'][Math.floor(Math.random()*3)];
            h.style.left = "50%"; h.style.top = "80%";
            h.style.setProperty('--tx', (Math.random()-0.5)*600 + "px");
            h.style.setProperty('--ty', (Math.random()-0.5)*600 - 200 + "px");
            h.style.fontSize = Math.random()*30 + 20 + "px";
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 1000);
        }
    </script>
</body>
</html>
