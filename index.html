<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة خاصة ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-color: #ff4d6d;
            --fb-color: #1877f2;
            --bg-gradient: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
        }

        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.2);
            padding: 50px 30px;
            border-radius: 40px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 25px 45px rgba(0,0,0,0.1);
            max-width: 380px; width: 85%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .img-wrapper {
            cursor: zoom-in;
            margin-bottom: 40px;
            display: inline-block;
        }

        .profile-img {
            width: 190px; height: 190px;
            border-radius: 30px;
            border: 6px solid rgba(255, 255, 255, 0.8);
            object-fit: cover;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: transform 0.5s ease;
        }

        .img-wrapper:hover .profile-img { transform: scale(1.05); }

        .buttons-container { display: flex; flex-direction: column; gap: 20px; }

        .btn {
            text-decoration: none; padding: 18px;
            border-radius: 20px; font-weight: bold;
            transition: all 0.3s ease; cursor: pointer;
            border: none; font-size: 17px; text-align: center;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn-profile { background: var(--fb-color); color: white; }
        .btn-surprise { background: var(--main-color); color: white; animation: pulse 2s infinite; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        /* نافذة المفاجأة (الفيديو) */
        #surprise-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); justify-content: center; align-items: center;
            z-index: 1000; flex-direction: column;
        }

        .video-container {
            width: 90%; max-width: 500px;
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 0 50px var(--main-color);
        }

        iframe { width: 100%; aspect-ratio: 16/9; border: none; }

        .close-btn {
            margin-top: 20px; padding: 10px 30px;
            background: white; color: black; border-radius: 50px;
            cursor: pointer; font-weight: bold;
        }

        /* نافذة تكبير الصورة */
        #image-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); justify-content: center; align-items: center;
            z-index: 2000;
        }

        #image-overlay img { max-width: 90%; max-height: 80%; border-radius: 15px; }

        .heart { position: absolute; font-size: 25px; pointer-events: none; animation: fall linear forwards; z-index: 50; }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="img-wrapper" onclick="openLightbox()">
            <img src="https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg" alt="Profile Image" class="profile-img">
        </div>
        
        <div class="buttons-container">
            <a href="https://www.facebook.com/share/18CFRsDyg2/" target="_blank" class="btn btn-profile">
                👤 زيارة الحساب الشخصي
            </a>
            <button onclick="showSurprise()" class="btn btn-surprise">
                🎁 افتحي المفاجأة
            </button>
        </div>
    </div>

    <div id="surprise-overlay">
        <div class="video-container">
            <iframe id="video-frame" src="" allow="autoplay"></iframe>
        </div>
        <div class="close-btn" onclick="closeSurprise()">إغلاق المفاجأة ✖</div>
    </div>

    <div id="image-overlay" onclick="closeLightbox()">
        <img src="https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg" alt="Zoomed">
    </div>

    <script>
        function openLightbox() { document.getElementById('image-overlay').style.display = 'flex'; }
        function closeLightbox() { document.getElementById('image-overlay').style.display = 'none'; }

        function showSurprise() {
            const overlay = document.getElementById('surprise-overlay');
            const video = document.getElementById('video-frame');
            // الرابط المستخدم هو للدمج (Embed) مع خاصية التشغيل التلقائي
            video.src = "https://streamable.com/e/2u533q?autoplay=1"; 
            overlay.style.display = 'flex';
            createHearts();
        }

        function closeSurprise() {
            const overlay = document.getElementById('surprise-overlay');
            const video = document.getElementById('video-frame');
            video.src = ""; // إيقاف الفيديو عند الإغلاق
            overlay.style.display = 'none';
        }

        function createHearts() {
            const emojis = ['❤️', '✨', '💖'];
            for(let i=0; i<40; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.classList.add('heart');
                    heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.top = '-5vh';
                    heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 5000);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
