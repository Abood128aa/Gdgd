<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghadoush Universe ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Cairo:wght@900&family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #ff0055;
            --neon-glow: rgba(255, 0, 85, 0.6);
            --card-bg: rgba(20, 20, 20, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html { 
            height: 100%; width: 100%; 
            font-family: 'Tajawal', sans-serif; 
            background: #000; overflow: hidden;
            color: white;
        }

        /* حاوية الفيديو العملاقة - خلفية حية */
        #video-bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none; opacity: 0.6;
        }
        #video-bg-container iframe {
            width: 100vw; height: 100vh;
            transform: scale(1.6);
            pointer-events: none;
        }

        /* شريط التقدم النيوني العلوي */
        .top-bar {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            width: 90%; height: 12px; background: rgba(255,255,255,0.05);
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            z-index: 1000; overflow: hidden; padding: 2px;
        }
        #progress-line {
            height: 100%; width: 0%; background: var(--neon);
            border-radius: 20px; box-shadow: 0 0 15px var(--neon);
            transition: width 0.6s ease;
        }

        /* واجهة المستخدم المركزية */
        .overlay-content {
            position: relative; z-index: 100; height: 100vh;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; padding: 20px;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.4) 100%);
        }

        /* البطاقة النيونية الكبيرة */
        .neon-card {
            background: var(--card-bg);
            border: 2px solid var(--neon);
            box-shadow: 0 0 30px var(--neon-glow);
            border-radius: 30px;
            padding: 35px 25px;
            width: 95%; max-width: 450px;
            text-align: center;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }

        #dynamic-quote {
            font-size: 1.8rem; font-weight: 900; line-height: 1.5;
            min-height: 80px; margin-bottom: 20px;
            transition: all 0.5s ease;
        }

        /* الأزرار النيونية الكبيرة */
        .btn-neon {
            background: transparent;
            color: white;
            border: 2px solid var(--neon);
            padding: 18px 45px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-family: 'Lalezar';
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px var(--neon-glow);
            width: 100%;
            margin-bottom: 15px;
            display: block;
            text-decoration: none;
        }
        .btn-neon:hover {
            background: var(--neon);
            box-shadow: 0 0 40px var(--neon);
            transform: scale(1.05);
        }

        .lvl-badge {
            font-size: 14px; color: #aaa; letter-spacing: 3px; margin-top: 10px;
        }

        /* شاشة الترحيب */
        #welcome-screen {
            position: fixed; inset: 0; z-index: 2000;
            background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.8s cubic-bezier(1, 0, 0, 1);
        }

        .heart-pop {
            position: absolute; pointer-events: none; z-index: 500;
            animation: popOut 1s ease-out forwards;
        }
        @keyframes popOut {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="top-bar"><div id="progress-line"></div></div>

    <div id="welcome-screen">
        <div style="font-size: 100px; margin-bottom: 30px; filter: drop-shadow(0 0 20px var(--neon));">👑</div>
        <button class="btn-neon" style="width: auto;" onclick="initExperience()">دخول عالم غدوش 🚀</button>
    </div>

    <div id="video-bg-container">
        <iframe id="cinema-engine" src="" frameborder="0" allow="autoplay; fullscreen"></iframe>
    </div>

    <div class="overlay-content" id="ui-layer" style="display: none;">
        
        <div class="neon-card">
            <div id="dynamic-quote">جاهزة للمفاجأة يا غدوش؟</div>
            
            <button class="btn-neon" onclick="nextWave()">إعادة يا غدوش 🔄</button>
            
            <a href="https://www.facebook.com/share/18CFRsDyg2/" target="_blank" class="btn-neon" style="font-size: 1.1rem; padding: 12px; border-color: #555; box-shadow: none;">
                👤 الحساب الشخصي
            </a>
            
            <div class="lvl-badge">LEVEL: <span id="lvl-text" style="color:var(--neon)">1</span></div>
        </div>

        <p onclick="location.reload()" style="color:#444; cursor:pointer;">خروج نهائي</p>
    </div>

    <script>
        let waveCount = 0;
        let vIndex = 0;
        const vids = ["2u533q", "70ymh0"]; 
        const quotes = [
            "أنتِ الأجمل في هذا الكون يا غدوش 🌌",
            "سحر عينيكِ يغلب كل الفيديوهات 💖",
            "غدوش.. الملكة التي لا تُقهر 👑",
            "طاقة جمالكِ وصلت للمستوى الأقصى ⚡",
            "كل ثانية معكِ هي حياة كاملة ✨",
            "جمالكِ يا غدوش يزداد مع كل ضغطة 😍",
            "أنتِ نادرة جداً ومميزة 💎"
        ];
        const fonts = ["'Lalezar'", "'Cairo'", "'Tajawal'"];

        function initExperience() {
            document.getElementById('welcome-screen').style.transform = "translateY(-100%)";
            document.getElementById('ui-layer').style.display = 'flex';
            nextWave();
        }

        function nextWave() {
            waveCount++;
            
            // تحديث العداد
            const bar = document.getElementById('progress-line');
            bar.style.width = Math.min(waveCount * 10, 100) + "%";
            document.getElementById('lvl-text').innerText = waveCount;

            // تحديث الفيديو
            const engine = document.getElementById('cinema-engine');
            engine.src = `https://streamable.com/e/${vids[vIndex]}?autoplay=1&nocontrols=1`;
            vIndex = (vIndex + 1) % vids.length;

            // تحديث النص والخط
            const text = document.getElementById('dynamic-quote');
            text.style.opacity = 0;
            
            setTimeout(() => {
                text.innerText = quotes[Math.floor(Math.random() * quotes.length)];
                text.style.fontFamily = fonts[Math.floor(Math.random() * fonts.length)];
                text.style.color = `hsl(${Math.random()*20 + 340}, 100%, 80%)`;
                text.style.opacity = 1;
            }, 300);

            // انفجار القلوب
            for(let i=0; i<25; i++) spawnHeart();
        }

        function spawnHeart() {
            const h = document.createElement('div');
            h.className = 'heart-pop';
            h.innerHTML = ['❤️','💖','✨','🔥'][Math.floor(Math.random()*4)];
            h.style.left = "50%"; h.style.top = "50%";
            h.style.setProperty('--tx', (Math.random()-0.5)*800 + "px");
            h.style.setProperty('--ty', (Math.random()-0.5)*800 + "px");
            h.style.fontSize = Math.random()*30 + 20 + "px";
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 1000);
        }
    </script>
</body>
</html>
