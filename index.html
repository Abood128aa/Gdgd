<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghadoush Universe ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Cairo:wght@900&family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #ff0055; --neon-glow: rgba(255, 0, 85, 0.6); --card-bg: rgba(10, 10, 10, 0.95); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; font-family: 'Tajawal', sans-serif; background: #000; overflow: hidden; color: white; }
        #video-bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; opacity: 0.6; overflow: hidden; }
        #video-bg-container iframe { position: absolute; top: 50%; left: 50%; width: 100vw; height: 100vh; transform: translate(-50%, -50%) scale(1.8); pointer-events: none; }
        #transition-overlay { position: fixed; inset: 0; background: #000; z-index: 1500; opacity: 0; pointer-events: none; transition: opacity 1s ease-in-out; }
        #welcome-screen { position: fixed; inset: 0; z-index: 2000; background: radial-gradient(circle, #1a1a1a, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 1s cubic-bezier(0.85, 0, 0.15, 1); }
        .profile-img-btn { width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--neon); box-shadow: 0 0 30px var(--neon-glow); cursor: pointer; object-fit: cover; margin-bottom: 25px; }
        .overlay-content { position: relative; z-index: 100; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .neon-card { background: var(--card-bg); border: 2px solid var(--neon); box-shadow: 0 0 40px var(--neon-glow); border-radius: 35px; padding: 30px 20px; width: 95%; max-width: 400px; text-align: center; backdrop-filter: blur(20px); }
        #dynamic-quote { font-size: 1.6rem; font-weight: 900; margin-bottom: 25px; min-height: 70px; }
        .btn-neon { background: var(--neon); color: white; border: none; padding: 16px; border-radius: 50px; font-size: 1.4rem; font-family: 'Lalezar'; cursor: pointer; width: 100%; box-shadow: 0 8px 20px var(--neon-glow); margin-bottom: 12px; display: block; text-decoration: none; transition: 0.3s; }
        .btn-back { background: transparent; border: 1px solid #444; color: #888; font-size: 0.9rem; padding: 10px; }
    </style>
</head>
<body>

    <div id="transition-overlay"></div>

    <div id="welcome-screen">
        <img src="https://i.ibb.co/5WgXmYqc/FB-IMG-1772058101659.jpg" class="profile-img-btn" onclick="initExperience()">
        <button class="btn-neon" style="width: auto; padding: 12px 35px;" onclick="initExperience()">دخول عالم غدوش ✨</button>
    </div>

    <div id="video-bg-container">
        <iframe id="cinema-engine" src="" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
    </div>

    <div class="overlay-content" id="ui-layer" style="display: none;">
        <div class="neon-card" id="main-card">
            <div id="dynamic-quote"></div>
            <button class="btn-neon" onclick="refreshContent()">إعادة يا غدوش 🔄</button>
            <a href="https://www.facebook.com/share/18CFRsDyg2/" target="_blank" class="btn-neon" style="background: #1877f2; font-size: 1rem; box-shadow: none;">👤 بروفايل فيسبوك</a>
            <button class="btn-neon btn-back" onclick="goBack()">🔙 عودة</button>
        </div>
    </div>

    <script>
        let vIndex = 0;
        // تم تحديث الروابط لتكون أكثر توافقاً
        const vids = ["2u533q", "70ymh0"]; 
        const quotes = ["أنتِ النور يا غدوش ✨", "جمالكِ ليس له مثيل 💖", "ابتسامتكِ سر السعادة 👑", "كل ثانية معكِ حكاية ✨"];

        function initExperience() {
            document.getElementById('welcome-screen').style.transform = "translateY(-100%)";
            document.getElementById('ui-layer').style.display = 'flex';
            refreshContent();
        }

        function refreshContent() {
            const overlay = document.getElementById('transition-overlay');
            overlay.style.opacity = "1";

            setTimeout(() => {
                const engine = document.getElementById('cinema-engine');
                // إضافة muted=1 ضرورية جداً لتعمل الفيديوهات تلقائياً عند الطرف الآخر
                engine.src = `https://streamable.com/e/${vids[vIndex]}?autoplay=1&muted=1&nocontrols=1`;
                vIndex = (vIndex + 1) % vids.length;

                document.getElementById('dynamic-quote').innerText = quotes[Math.floor(Math.random() * quotes.length)];
                
                setTimeout(() => {
                    overlay.style.opacity = "0";
                }, 800);
            }, 1000); 
        }

        function goBack() {
            document.getElementById('welcome-screen').style.transform = "translateY(0)";
            document.getElementById('cinema-engine').src = "";
        }
    </script>
</body>
</html>
